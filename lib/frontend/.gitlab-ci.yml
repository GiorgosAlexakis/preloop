image: node:22-alpine

variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/spacecode/spacelit

stages:
  - build
  - test

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64 -w 0)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      --destination $CI_REGISTRY_IMAGE:latest
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
      --registry-mirror registry.spacecode.ai
      --registry-mirror $CI_REGISTRY    

format-check:
  stage: test
  needs: []
  before_script:
    - npm install
  script:
    - npm run format:check

unit-tests:
  stage: test
  needs: []
  image: mcr.microsoft.com/playwright:v1.53.1-noble
  before_script:
    - npm install
  script:
    - npm run test

