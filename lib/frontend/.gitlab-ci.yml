# GitLab CI/CD configuration for SpaceLit frontend

image: node:18

# Global variables
variables:
  NODE_ENV: test
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

# Cache node_modules for faster builds
cache:
  paths:
    - .npm/
    - node_modules/

# Pipeline stages
stages:
  - install
  - validate
  - test
  - build

# Install dependencies
install:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# Validate code formatting
format-check:
  stage: validate
  needs: ['install']
  script:
    - npm run format:check
  allow_failure: false

# Run tests
test:
  stage: test
  needs: ['install']
  script:
    - npm run test
  artifacts:
    reports:
      junit: test-results.xml
    when: always
  # Tests run in headless mode in CI
  variables:
    CI: 'true'

# Build the application to ensure it compiles
build:
  stage: build
  needs: ['install']
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - merge_requests

