image: alpine:3.15

stages:
  - test

pre-commit:
  stage: test
  needs: []
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y git
    - pip install -U pre-commit ruff
  script:
    - pre-commit install
    - pre-commit run --all-files

pytest:
  stage: test
  needs: []
  image: python:3.11-slim
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres 
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB_NAME: postgres
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
  before_script:
    - pip install -e .
    - pip install pytest pytest-cov pytest-timeout click
    - apt-get update && apt-get install -y postgresql-client
    - PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB_NAME -c "CREATE EXTENSION IF NOT EXISTS vector;"
    - python scripts/drop_tables.py --force
    - python scripts/create_tables.py --force
  script:
    - pytest -vvv tests/ --cov=spacemodels --cov-report=xml --cov-report=term-missing --timeout=240 --cov-fail-under=82
