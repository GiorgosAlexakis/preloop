apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spacebridge.fullname" . }}
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spacebridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "spacebridge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "spacebridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HOST
              value: {{ .Values.environment.host | quote }}
            - name: PORT
              value: {{ .Values.environment.port | quote }}
            - name: DEBUG
              value: {{ .Values.environment.debug | quote }}
            - name: DATABASE_URL
              value: {{ .Values.environment.databaseUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: {{ .Values.environment.jwtAlgorithm | quote }}
            - name: JWT_EXPIRE_MINUTES
              value: {{ .Values.environment.jwtExpireMinutes | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.environment.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.environment.logFormat | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.environment.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
