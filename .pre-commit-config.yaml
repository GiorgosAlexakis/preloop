exclude: |
    (?x)^(
        SpaceLit/.*|
        SpaceModels/.*|
        spacesync/.*|
        .*\.log\.json$
    )$

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
        exclude: ^(helm/|scripts/examples/helm/|mkdocs.yml$)
    -   id: check-added-large-files
    -   id: debug-statements
    -   id: check-toml

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

-   repo: local
    hooks:
    -   id: generate-openapi
        name: Generate OpenAPI schema
        entry: python scripts/generate_openapi.py
        language: system
        types: [python] # Run when Python files are committed
        pass_filenames: false # The script doesn't need filenames
        stages: [pre-commit] # Run during the commit stage
