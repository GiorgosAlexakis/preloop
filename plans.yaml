  - id: "teams"
    name: "Teams"
    price_monthly: 29
    price_annually: 290
    features:
      api_calls_monthly: -1
      ai_calls_monthly: -1
      issues_ingested_monthly: -1
      custom_ai_models_enabled: true
      custom_compliance_metrics_enabled: true
  - id: "enterprise"
    name: "Enterprise"
    price_monthly: null # Custom pricing
    price_annually: null # Custom pricing
    features:
      api_calls_monthly: -1
      ai_calls_monthly: -1
      issues_ingested_monthly: -1
      custom_ai_models_enabled: true
      custom_compliance_metrics_enabled: true
