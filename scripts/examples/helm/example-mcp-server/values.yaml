replicaCount: 1

image:
  repository: registry.spacecode.ai/spacecode/example-mcp-server
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Required for MCP StreamableHTTP (SSE) support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    # Enable chunked transfer encoding for streaming
    nginx.ingress.kubernetes.io/chunked-transfer-encoding: "true"
  hosts:
    - host: example-mcp.preloop.ai
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: example-mcp-server-tls
      hosts:
        - example-mcp.preloop.ai

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  - name: BEARER_TOKEN
    value: "test-token-12345"

nodeSelector: {}

tolerations: []

affinity: {}
