  /api/v1/cel/validate:
    post:
      tags:
      - CEL Validation
      - CEL Validation
      summary: Validate a CEL expression
      description: 'Validate a CEL expression for syntax errors.


        This endpoint checks whether a CEL expression is syntactically valid

        and can be used in policy conditions. It catches errors like:


        - Syntax errors (unbalanced parentheses, invalid operators)

        - Unknown functions or methods

        - Invalid field access patterns


        Use this endpoint to validate CEL expressions before saving them

        in policy configurations.


        Example expressions:

        - `args.amount > 100` - Numeric comparison

        - `args.path.contains(''/prod/'')` - String contains check

        - `args.environment == ''production''` - String equality

        - `args.tags.exists(t, t == ''sensitive'')` - List existence check'
      operationId: validate_cel_expression_api_v1_cel_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CELValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CELValidateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/cel/test:
    post:
      tags:
      - CEL Validation
      - CEL Validation
      summary: Test a CEL expression with sample data
      description: "Test a CEL expression against sample data.\n\nThis endpoint validates\
        \ the expression syntax and then evaluates it\nagainst the provided test data.\
        \ Use this to verify that your CEL\nexpression works as expected before deploying\
        \ it.\n\nThe test_data should match the structure available during policy\n\
        evaluation. Typically this includes:\n\n- `args`: The tool arguments (dict)\n\
        - `tool_name`: Name of the tool (string)\n- `user_id`: User ID (string, optional)\n\
        - `account_id`: Account ID (string)\n\nExample request:\n```json\n{\n    \"\
        expression\": \"args.amount > 100\",\n    \"test_data\": {\n        \"args\"\
        : {\n            \"amount\": 150,\n            \"recipient\": \"admin\"\n\
        \        }\n    }\n}\n```\n\nExample response for matching expression:\n```json\n\
        {\n    \"valid\": true,\n    \"evaluated\": true,\n    \"result\": true\n\
        }\n```"
      operationId: test_cel_expression_api_v1_cel_test_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CELTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CELTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/cel/validate/batch:
    post:
      tags:
      - CEL Validation
      - CEL Validation
      summary: Validate multiple CEL expressions
      description: "Validate multiple CEL expressions in a single request.\n\nThis\
        \ endpoint is useful when importing policies with multiple\nconditions, allowing\
        \ you to validate all expressions at once.\n\nExample request:\n```json\n\
        {\n    \"expressions\": [\n        \"args.amount > 100\",\n        \"args.path.startsWith('/etc/')\"\
        ,\n        \"invalid expression ((\"\n    ]\n}\n```\n\nReturns validation\
        \ results for each expression and summary counts."
      operationId: validate_cel_expressions_batch_api_v1_cel_validate_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CELBatchValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CELBatchValidateResponse'
        '422':
