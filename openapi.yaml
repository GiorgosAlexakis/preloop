    ToolCondition:
      properties:
        expression:
          type: string
          title: Expression
          description: Expression to evaluate against tool args
        action:
          $ref: '#/components/schemas/ConditionAction'
          description: Action when condition matches
          default: require_approval
        condition_type:
          $ref: '#/components/schemas/ConditionType'
          description: 'Expression type: ''simple'' (open source) or ''cel'' (enterprise)'
          default: simple
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description of this condition
      type: object
      required:
      - expression
      title: ToolCondition
      description: "Condition for when to apply actions to tool invocations.\n\nSupports\
        \ two types of conditions for the open core model:\n\nSimple conditions (open\
        \ source):\n    Basic comparisons using Python-like syntax. These are evaluated\n\
        \    using a lightweight parser that supports basic operators.\n\n    Supported\
        \ operators: ==, !=, >, <, >=, <=\n\n    Examples:\n        - \"args.amount\
        \ > 500\"\n        - \"args.recipient == 'bob'\"\n        - \"args.count <=\
        \ 10\"\n\nCEL conditions (enterprise):\n    Full CEL (Common Expression Language)\
        \ expressions with advanced\n    functions like contains(), startsWith(),\
        \ endsWith(), exists(), etc.\n\n    Examples:\n        - \"args.command.contains('rm\
        \ -rf')\"\n        - \"args.path.startsWith('/etc/')\"\n        - \"args.environment\
        \ == 'production' && args.force == true\"\n        - \"args.tags.exists(t,\
        \ t == 'sensitive')\"\n\nAttributes:\n    expression: Expression to evaluate\
        \ against tool arguments.\n    action: Action to take when condition matches.\n\
        \    condition_type: Type of expression - 'simple' (open source) or 'cel'\
        \ (enterprise).\n    description: Optional human-readable description."
