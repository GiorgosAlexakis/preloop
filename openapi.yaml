      description: "Unified OAuth callback for sign-up and sign-in.\n\nFlow:\n1. Validate\
        \ state (CSRF protection)\n2. Exchange code for provider tokens\n3. Fetch\
        \ user profile from provider\n4. Look up existing user:\n   a. By oauth_provider\
        \ + oauth_id → sign-in (returning OAuth user)\n   b. By verified email → auto-link\
        \ OAuth to existing account\n   c. Not found → sign-up (create new account\
        \ + user)\n5. Issue Preloop JWT\n6. Redirect:\n   - CLI redirect_uri → tokens\
        \ as query params\n   - Frontend → /console with JWT cookie/param"
