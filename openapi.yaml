      description: 'Receive centralized webhook events from GitHub App.


        This endpoint handles webhooks from GitHub App installations, which are

        delivered to a single URL for all installations (unlike per-org webhooks).


        The handler:

        1. Verifies the webhook signature using GITHUB_APP_WEBHOOK_SECRET

        2. Extracts the installation_id from the payload

        3. Looks up the tracker associated with that installation

        4. Processes the event and publishes to NATS


        This is the SaaS-only webhook endpoint for GitHub App OAuth integrations.'
      operationId: receive_github_app_webhook_api_v1_webhooks_github_app_post
