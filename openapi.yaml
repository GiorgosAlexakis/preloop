          description: Optional description
        provider_name:
          type: string
          title: Provider Name
          description: e.g., 'openai', 'anthropic'
        model_identifier:
          type: string
          title: Model Identifier
          description: Standardized identifier, e.g., 'gpt-4-turbo'
