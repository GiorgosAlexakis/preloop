openapi: 3.1.0
info:
  title: Preloop API
  description: REST API for Preloop issue tracking management
  version: 0.1.0
paths:
  /api/v1/issue_compliance_prompts:
    get:
      tags:
      - Issues
      - Analytics
      - Issues
      summary: Get Compliance Prompts
      description: Get a list of available compliance prompts.
      operationId: get_compliance_prompts_api_v1_issue_compliance_prompts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CompliancePromptMetadata'
                type: array
                title: Response Get Compliance Prompts Api V1 Issue Compliance Prompts
                  Get
      security:
      - bearerAuth: []
  /api/v1/issue_compliance/{issue_id}:
    get:
      tags:
      - Issues
      - Analytics
      - Issues
      summary: Get Issue Compliance
      description: Get or calculate the compliance result for a given issue.
      operationId: get_issue_compliance_api_v1_issue_compliance__issue_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: issue_id
        in: path
        required: true
        schema:
          type: string
          title: Issue Id
      - name: prompt_name
        in: query
        required: true
        schema:
          type: string
          title: Prompt Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueComplianceResultResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/issue_compliance_suggestion/{issue_id}:
    get:
      tags:
      - Issues
      - Analytics
      summary: Get Compliance Improvement Suggestion
      description: Generate a compliance improvement suggestion for a given issue.
      operationId: get_compliance_improvement_suggestion_api_v1_issue_compliance_suggestion__issue_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: issue_id
        in: path
        required: true
        schema:
          type: string
          title: Issue Id
      - name: prompt_name
        in: query
        required: true
        schema:
          type: string
          title: Prompt Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceSuggestionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/issue_compliance_update/{issue_id}:
    patch:
      tags:
      - Issues
      - Analytics
      - Issues
      summary: Update Issue Content
      description: Update the title and description of an issue and sync to tracker.
      operationId: update_issue_content_api_v1_issue_compliance_update__issue_id__patch
      security:
      - bearerAuth: []
      parameters:
      - name: issue_id
        in: path
        required: true
        schema:
          type: string
          title: Issue Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/issue-duplicates/confirmed:
    get:
      tags:
      - Issue Duplicates
      - Analytics
      - Issue Duplicates
      summary: Get Duplicate Issues
      description: Retrieve confirmed duplicate issues.
      operationId: get_duplicate_issues_api_v1_issue_duplicates_confirmed_get
      security:
      - bearerAuth: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueDuplicate'
                title: Response Get Duplicate Issues Api V1 Issue Duplicates Confirmed
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/issue-duplicates/check:
    get:
      tags:
      - Issue Duplicates
      - Analytics
      - Issue Duplicates
      summary: Check Or Create Issue Duplicate
      operationId: check_or_create_issue_duplicate_api_v1_issue_duplicates_check_get
      security:
      - bearerAuth: []
      parameters:
      - name: issue1_id
        in: query
        required: true
        schema:
          type: string
          title: Issue1 Id
      - name: issue2_id
        in: query
        required: true
        schema:
          type: string
          title: Issue2 Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDuplicate'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/issue-duplicates/propose-resolution:
    patch:
      tags:
      - Issue Duplicates
      - Analytics
      - Issue Duplicates
      summary: Propose Issue Duplicate Resolution
      description: Propose a resolution for an issue duplicate.
      operationId: propose_issue_duplicate_resolution_api_v1_issue_duplicates_propose_resolution_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueDuplicateSuggestionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDuplicate'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-duplicates/execute-resolution:
    patch:
      tags:
      - Issue Duplicates
      - Analytics
      - Issue Duplicates
      summary: Execute Issue Duplicate Resolution
      description: Execute the resolution for a pair of duplicate issues.
      operationId: execute_issue_duplicate_resolution_api_v1_issue_duplicates_execute_resolution_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueDuplicateResolutionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDuplicateResolutionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-duplicates:
    get:
      tags:
      - Issue Duplicates
      - Analytics
      summary: Find Issue Duplicates
      description: Finds potential duplicate issues within specified projects.
      operationId: find_issue_duplicates_api_v1_issue_duplicates_get
      security:
      - bearerAuth: []
      parameters:
      - name: project_ids
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: Optional list of project IDs to search within. If not provided,
            searches across all accessible projects.
          title: Project Ids
        description: Optional list of project IDs to search within. If not provided,
          searches across all accessible projects.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Maximum number of duplicates to return.
          default: 5
          title: Limit
        description: Maximum number of duplicates to return.
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of duplicates to skip for pagination.
          default: 0
          title: Skip
        description: Number of duplicates to skip for pagination.
      - name: similarity_threshold
        in: query
        required: false
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: Similarity threshold for considering issues as duplicates.
          default: 0.7
          title: Similarity Threshold
        description: Similarity threshold for considering issues as duplicates.
      - name: limit_per_issue
        in: query
        required: false
        schema:
          type: integer
          maximum: 20
          minimum: 1
          description: Maximum number of duplicates to find for each issue.
          default: 5
          title: Limit Per Issue
        description: Maximum number of duplicates to find for each issue.
      - name: status
        in: query
        required: false
        schema:
          enum:
          - opened
          - closed
          - all
          type: string
          description: Filter issues by status.
          default: opened
          title: Status
        description: Filter issues by status.
      - name: resolution
        in: query
        required: false
        schema:
          enum:
          - resolved
          - unresolved
          - all
          type: string
          description: Filter by resolution status.
          default: all
          title: Resolution
        description: Filter by resolution status.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDuplicatesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/project-duplicate-stats:
    get:
      tags:
      - Issue Duplicates
      - Analytics
      summary: Get Projects Duplicate Stats
      description: Get statistics about duplicate issues for specified projects.
      operationId: get_projects_duplicate_stats_api_v1_project_duplicate_stats_get
      security:
      - bearerAuth: []
      parameters:
      - name: project_ids
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: A list of project IDs to filter the statistics by. If not provided,
            stats for all accessible projects will be returned.
          title: Project Ids
        description: A list of project IDs to filter the statistics by. If not provided,
          stats for all accessible projects will be returned.
      - name: similarity_threshold
        in: query
        required: false
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: Similarity threshold for considering issues as duplicates.
          default: 0.95
          title: Similarity Threshold
        description: Similarity threshold for considering issues as duplicates.
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter issues by status.
          title: Status
        description: Filter issues by status.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDuplicateStats'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ai-suggestion:
    post:
      tags:
      - Issue Duplicates
      - Analytics
      summary: Get Resolution Suggestion
      description: Generate a suggestion for resolving a duplicate issue pair.
      operationId: get_resolution_suggestion_api_v1_ai_suggestion_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_get_resolution_suggestion_api_v1_ai_suggestion_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDuplicateSuggestionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/detect:
    post:
      tags:
      - Issues
      - Analytics
      - Issues
      - AI
      summary: Detect dependencies between a list of issues using an AI model.
      description: 'Analyzes a list of issues to find potential dependencies between
        them.


        - **issue_ids**: A list of UUIDs for the issues to be analyzed.

        - **model_id**: Optional ID of a specific AI model to use. If not provided,
        the user''s default model will be used.'
      operationId: detect_issue_dependencies_api_v1_issue_dependencies_detect_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DependencyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/commit:
    post:
      tags:
      - Issues
      - Analytics
      - Issues
      summary: Commit a list of issue dependencies.
      description: 'Commits a list of issue dependency pairs. This will create the
        dependency in the external tracker and mark it as ''committed'' in Preloop.


        - **dependencies**: A list of dependency pairs to commit.'
      operationId: commit_issue_dependencies_api_v1_issue_dependencies_commit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitDependenciesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/extend:
    post:
      tags:
      - Issues
      - Analytics
      - Issues
      - AI
      summary: Extend the dependency scan for a specific issue.
      description: 'Extends the dependency scan for a specific issue to find more
        related issues.


        - **issue_ids**: The IDs of the issues to extend the scan from.

        - **extend_by**: The number of additional issues to fetch and analyze.'
      operationId: extend_dependency_scan_api_v1_issue_dependencies_extend_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendScanRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/audit-logs:
    get:
      tags:
      - Audit Logs
      summary: List audit logs with filters
      description: 'List audit logs with optional filters.


        This endpoint allows querying audit logs for the current user''s account

        with various filter options including action type, status, resource type,

        and date range.


        Requires the ''view_audit_logs'' permission.'
      operationId: list_audit_logs_api_v1_audit_logs_get
      security:
      - bearerAuth: []
      parameters:
      - name: action
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by action (e.g., 'permission_check', 'role_assigned')
          title: Action
        description: Filter by action (e.g., 'permission_check', 'role_assigned')
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status (e.g., 'success', 'denied', 'failure')
          title: Status Filter
        description: Filter by status (e.g., 'success', 'denied', 'failure')
      - name: resource_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by resource type (e.g., 'issue', 'user', 'team')
          title: Resource Type
        description: Filter by resource type (e.g., 'issue', 'user', 'team')
      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Filter by start date (ISO 8601 format)
          title: Start Date
        description: Filter by start date (ISO 8601 format)
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Filter by end date (ISO 8601 format)
          title: End Date
        description: Filter by end date (ISO 8601 format)
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Maximum number of records
          default: 100
          title: Limit
        description: Maximum number of records
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit-logs/grouped:
    get:
      tags:
      - Audit Logs
      summary: Get audit logs grouped by correlation for unified timeline
      description: 'Get audit logs grouped by correlation_id for the unified timeline.


        Returns tool call events as primary rows with their correlated sub-events

        (policy decisions, approval lifecycle) grouped together. Non-tool events

        are returned as standalone groups.'
      operationId: list_grouped_audit_logs_api_v1_audit_logs_grouped_get
      security:
      - bearerAuth: []
      parameters:
      - name: event_type
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: 'Filter by event type(s): ''tool_call'', ''model_gateway_request'',
            ''config:mcp_server'', ''config:tool_rule'', etc.'
          title: Event Type
        description: 'Filter by event type(s): ''tool_call'', ''model_gateway_request'',
          ''config:mcp_server'', ''config:tool_rule'', etc.'
      - name: outcome
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: Filter by outcome(s) (allow, deny, require_approval, approved,
            declined, failed, budget_denied)
          title: Outcome
        description: Filter by outcome(s) (allow, deny, require_approval, approved,
          declined, failed, budget_denied)
      - name: tool_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by tool name (substring match)
          title: Tool Name
        description: Filter by tool name (substring match)
      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Filter by start date (ISO 8601)
          title: Start Date
        description: Filter by start date (ISO 8601)
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Filter by end date (ISO 8601)
          title: End Date
        description: Filter by end date (ISO 8601)
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of groups to skip
          default: 0
          title: Skip
        description: Number of groups to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of groups
          default: 50
          title: Limit
        description: Maximum number of groups
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditGroupedListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit-logs/stats:
    get:
      tags:
      - Audit Logs
      summary: Get audit log statistics
      description: 'Get statistics about audit events.


        Returns aggregated statistics including action counts by type and status,

        top active users, and total log counts for the specified time period.


        Requires the ''view_audit_logs'' permission.'
      operationId: get_audit_stats_api_v1_audit_logs_stats_get
      security:
      - bearerAuth: []
      parameters:
      - name: days
        in: query
        required: false
        schema:
          type: integer
          maximum: 365
          minimum: 1
          description: Number of days to analyze (default 30)
          default: 30
          title: Days
        description: Number of days to analyze (default 30)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStatsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit-logs/user/{user_id}:
    get:
      tags:
      - Audit Logs
      summary: Get audit logs for a specific user
      description: 'Get audit logs for a specific user.


        Returns all audit logs associated with the specified user within the

        given time period. This is useful for investigating user activity and

        tracking security-relevant actions.


        Requires the ''view_audit_logs'' permission.'
      operationId: get_user_audit_logs_api_v1_audit_logs_user__user_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: days
        in: query
        required: false
        schema:
          type: integer
          maximum: 365
          minimum: 1
          description: Number of days to look back (default 30)
          default: 30
          title: Days
        description: Number of days to look back (default 30)
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Maximum number of records
          default: 100
          title: Limit
        description: Maximum number of records
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit-logs/denials:
    get:
      tags:
      - Audit Logs
      summary: Get recent permission denial events
      description: 'Get recent permission denial events.


        Returns all permission check events that resulted in denial within the

        specified time period. This is useful for security auditing and

        identifying potential unauthorized access attempts.


        Requires the ''view_audit_logs'' permission.'
      operationId: get_permission_denials_api_v1_audit_logs_denials_get
      security:
      - bearerAuth: []
      parameters:
      - name: days
        in: query
        required: false
        schema:
          type: integer
          maximum: 90
          minimum: 1
          description: Number of days to look back
          default: 7
          title: Days
        description: Number of days to look back
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Maximum number of records
          default: 100
          title: Limit
        description: Maximum number of records
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/billing/plans:
    get:
      tags:
      - Billing
      summary: List Public Plans
      description: List all available public subscription plans.
      operationId: list_public_plans_api_v1_billing_plans_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Plan'
                type: array
                title: Response List Public Plans Api V1 Billing Plans Get
    post:
      tags:
      - Billing
      summary: Create Plan
      description: 'Create a new subscription plan.

        (Requires superuser privileges).'
      operationId: create_plan_api_v1_billing_plans_post
      requestBody:
        content:
          application/json:
            schema:
