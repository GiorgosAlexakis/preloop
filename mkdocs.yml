# mkdocs.yml
site_name: SpaceBridge Documentation
site_url: https://spacebridge.io/docs/
repo_url: https://github.com/spacecode-ai/spacebridge-mcp

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

# Source directory for Markdown files
docs_dir: docs

# Extensions
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details # For collapsible blocks
  - pymdownx.tabbed: # For tabbed content
      alternate_style: true
  - admonition # For call-out blocks
  - toc:
      permalink: true # Add anchors to headings

plugins:
  - search # Built-in search plugin
  - mermaid2

# Removed mermaid2 config block (not supported by plugin version)

# Navigation (Optional: MkDocs can auto-detect from docs/ structure)
