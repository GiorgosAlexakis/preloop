apiVersion: v2
name: preloop
description: A Helm chart for Preloop - The policy engine for AI agents with approval workflows and audit trails

# A chart can be either an 'application' or a 'library' chart.
type: application

# Chart version
version: 0.8.0-beta.5

# Application version
appVersion: "0.8.0-beta.5"

# Keywords for the chart
keywords:
  - preloop
  - automation
  - human-in-the-loop
  - mcp
  - jira
  - github
  - gitlab

# Home URL for the project
home: https://preloop.ai

# Chart maintainers
maintainers:
  - name: Spacecode AI Inc. Team
    email: hello@preloop.ai

# Icon for the chart (optional)
icon: https://preloop.ai/assets/favicon.png

# Dependencies
# CloudNativePG operator should be installed in the cluster
# https://cloudnative-pg.io/documentation/1.22/

dependencies:
  - name: nats
    repository: "https://nats-io.github.io/k8s/helm/charts"
    version: "1.3.9"
    alias: nats
    condition: nats.enabled
