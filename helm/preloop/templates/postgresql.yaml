{{- if and .Values.database.enabled (not .Values.database.external) }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.database.cnpg.name | default (printf "%s-db" (include "preloop.fullname" .)) }}
  labels:
    {{- include "preloop.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.database.cnpg.instances }}
  imageName: {{ .Values.database.cnpg.imageName }}
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: restart

  # HA: replication slots for reliable WAL streaming to replicas
  {{- if gt (int .Values.database.cnpg.instances) 1 }}
  replicationSlots:
    highAvailability:
      enabled: true
      slotPrefix: _cnpg_
    synchronizeReplicas:
      enabled: true
    updateInterval: 30
  {{- end }}

  # Pod scheduling — prefer spreading replicas across nodes
  affinity:
    podAntiAffinityType: preferred

  # Graceful shutdown/failover timeouts
  failoverDelay: 0
  switchoverDelay: 3600
  smartShutdownTimeout: 180
  startDelay: 3600
  stopDelay: 1800
  enablePDB: true
  postgresql:
    parameters:
      {{- range $key, $value := .Values.database.cnpg.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
      {{- if .Values.database.cnpg.resilience.enabled }}
      statement_timeout: {{ .Values.database.cnpg.resilience.statement_timeout | quote }}
      idle_in_transaction_session_timeout: {{ .Values.database.cnpg.resilience.idle_in_transaction_session_timeout | quote }}
      lock_timeout: {{ .Values.database.cnpg.resilience.lock_timeout | quote }}
      max_wal_size: {{ .Values.database.cnpg.resilience.max_wal_size | quote }}
      min_wal_size: {{ .Values.database.cnpg.resilience.min_wal_size | quote }}
      checkpoint_completion_target: {{ .Values.database.cnpg.resilience.checkpoint_completion_target | quote }}
      {{- end }}
      {{- if .Values.database.cnpg.logging.enabled }}
      log_min_duration_statement: {{ .Values.database.cnpg.logging.log_min_duration_statement | quote }}
      log_statement: {{ .Values.database.cnpg.logging.log_statement | quote }}
      log_line_prefix: {{ .Values.database.cnpg.logging.log_line_prefix | quote }}
      {{- end }}
      {{- if .Values.database.cnpg.queryAnalysis.enabled }}
      pg_stat_statements.track: "all"
      pg_stat_statements.max: "10000"
      {{- end }}
    {{- if .Values.database.cnpg.queryAnalysis.enabled }}
    shared_preload_libraries:
      - pg_stat_statements
    {{- end }}
  # User management
  enableSuperuserAccess: true
  superuserSecret:
    name: {{ include "preloop.fullname" . }}-db-superuser
  bootstrap:
    initdb:
      database: {{ .Values.database.cnpg.bootstrap.initdb.database }}
      owner: {{ .Values.database.cnpg.bootstrap.initdb.owner }}
      secret:
        name: {{ include "preloop.fullname" . }}-db-user
      postInitSQL:
        {{- if .Values.database.cnpg.pgvector.enabled }}
        - CREATE EXTENSION IF NOT EXISTS vector;
        {{- end }}
        {{- if .Values.database.cnpg.queryAnalysis.enabled }}
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
        {{- end }}

  # Monitoring
  monitoring:
    enablePodMonitor: {{ .Values.database.cnpg.monitoring.enablePodMonitor | default false }}
    disableDefaultQueries: false

  {{- if .Values.database.cnpg.backup.enabled }}
  # Continuous backup to object storage
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.database.cnpg.backup.destinationPath }}
      {{- if .Values.database.cnpg.backup.s3Credentials }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.database.cnpg.backup.s3Credentials.secretName }}
          key: {{ .Values.database.cnpg.backup.s3Credentials.accessKeyIdKey | default "ACCESS_KEY_ID" }}
        secretAccessKey:
          name: {{ .Values.database.cnpg.backup.s3Credentials.secretName }}
          key: {{ .Values.database.cnpg.backup.s3Credentials.secretAccessKeyKey | default "SECRET_ACCESS_KEY" }}
      {{- end }}
      wal:
        compression: {{ .Values.database.cnpg.backup.walCompression | default "gzip" }}
    retentionPolicy: {{ .Values.database.cnpg.backup.retentionPolicy | default "30d" | quote }}
  {{- end }}

  # Storage configuration
  storage:
    size: {{ .Values.database.cnpg.storage.size }}
    {{- with .Values.database.cnpg.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}

  # Resources
  resources:
    {{- toYaml .Values.database.cnpg.resources | nindent 4 }}

---
# Superuser secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preloop.fullname" . }}-db-superuser
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ .Values.database.cnpg.auth.password }}

---
# Regular user secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preloop.fullname" . }}-db-user
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.database.cnpg.auth.username }}
  password: {{ .Values.database.cnpg.auth.password }}
{{- end }}
