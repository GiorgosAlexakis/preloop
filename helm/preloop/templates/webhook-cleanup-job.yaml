{{- if .Values.cleanup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "preloop.fullname" . }}-webhook-cleanup-job
  labels:
    {{- include "preloop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      labels:
        {{- include "preloop.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: webhook-cleanup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          command: ["preloop-sync", "unregister-webhooks", "--cleanup-all"]
          env:
            - name: DATABASE_URL
              value: {{ include "preloop.databaseUrl" . }}
            - name: PRELOOP_URL
              value: {{ $.Values.environment.preloopUrl | quote }}
            - name: LOG_LEVEL
              value: "INFO"
      # Set a reasonable timeout for the job
      activeDeadlineSeconds: 300
{{- end }}
