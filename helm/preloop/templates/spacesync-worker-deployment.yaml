{{- range .Values.worker.pools }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preloop.fullname" $ }}-preloop-sync-worker-{{ .name }}
  labels:
    {{- include "preloop.labels" $ | nindent 4 }}
    app.kubernetes.io/component: preloop-sync-worker-{{ .name }}
    app: preloop-sync-worker-{{ .name}}
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      {{- include "preloop.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: preloop-sync-worker-{{ .name }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "preloop.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: preloop-sync-worker-{{ .name }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "preloop.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: preloop-sync-worker-{{ .name }}
          command:
            - preloop-sync
            - worker
            - "--tasks"
            - {{ if kindIs "slice" .tasks }}{{ join "," .tasks | quote }}{{ else }}{{ .tasks | quote }}{{ end }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - name: PRELOOP_URL
              value: {{ $.Values.environment.preloopUrl | quote }}
            - name: HOST
              value: {{ $.Values.environment.host | quote }}
            - name: PORT
              value: {{ $.Values.environment.port | quote }}
            - name: DEBUG
              value: {{ $.Values.environment.debug | quote }}
            - name: DATABASE_URL
              value: {{ include "preloop.databaseUrl" $ }}
            - name: AGENT_EXECUTION_NAMESPACE
              value: {{ $.Values.agentExecution.namespace.create | ternary $.Values.agentExecution.namespace.name $.Release.Namespace | quote }}
            - name: USE_KUBERNETES
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "preloop.fullname" $ }}
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: {{ $.Values.environment.jwtAlgorithm | quote }}
            - name: JWT_EXPIRE_MINUTES
              value: {{ $.Values.environment.jwtExpireMinutes | quote }}
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            {{- if $.Values.config.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "preloop.fullname" $ }}
                  key: openai-api-key
            {{- end }}
            {{- if $.Values.config.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "preloop.fullname" $ }}
                  key: anthropic-api-key
            {{- end }}
            {{- if $.Values.config.smtp.host }}
            - name: SMTP_HOST
              value: {{ $.Values.config.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ $.Values.config.smtp.port | quote }}
            - name: SMTP_USERNAME
              value: {{ $.Values.config.smtp.username | quote }}
            - name: SMTP_PASSWORD
              value: {{ $.Values.config.smtp.password | quote }}
            - name: SMTP_FROM
              value: {{ $.Values.config.smtp.from | quote }}
            - name: SMTP_FROM_NAME
              value: {{ $.Values.config.smtp.fromName | quote }}
            {{- end }}
            - name: NATS_URL
              value: {{ $.Values.nats.url | default (printf "nats://%s-nats:4222" $.Release.Name) }}
            {{- if $.Values.sentry.enabled }}
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "preloop.fullname" $ }}
                  key: sentry-dsn
            {{- end }}
          resources:
            {{- toYaml $.Values.worker.resources | nindent 12 }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
