apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preloop.fullname" . }}-console
  labels:
    {{- include "preloop.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
    app: console
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "preloop.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: console
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "preloop.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "preloop.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: console
          image: "{{ .Values.console.repository }}:{{ .Values.console.tag }}"
          imagePullPolicy: {{ .Values.console.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "preloop.fullname" . }}-nginx
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
