apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preloop_ai.fullname" . }}
  labels:
    {{- include "preloop_ai.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.environment.jwtSecret | b64enc | quote }}
  {{- if .Values.config.openai.apiKey }}
  openai-api-key: {{ .Values.config.openai.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.anthropic.apiKey }}
  anthropic-api-key: {{ .Values.config.anthropic.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.sentry.enabled }}
  sentry-dsn: {{ .Values.sentry.dsn | b64enc | quote }}
  {{- end }}
  {{- if and .Values.apns.enabled .Values.apns.authKey }}
  apns-auth-key: {{ .Values.apns.authKey | b64enc | quote }}
  {{- end }}
  {{- if and .Values.fcm.enabled .Values.fcm.credentialsJson }}
  fcm-credentials-json: {{ .Values.fcm.credentialsJson | b64enc | quote }}
  {{- end }}
