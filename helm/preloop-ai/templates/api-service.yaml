apiVersion: v1
kind: Service
metadata:
  name: {{ include "preloop_ai.fullname" . }}-api
  labels:
    {{- include "preloop_ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "preloop_ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
