# Default values for the SpaceBridge Helm chart

# Replica count for the deployment
replicaCount: 1

# Image configuration
image:
  repository: registry.spacecode.ai/spacecode/spacebridge
  pullPolicy: Always
  tag: "latest"  # Overrides the image tag

spacelit:
  repository: registry.spacecode.ai/spacecode/spacelit
  tag: "latest"
  pullPolicy: Always

# Image pull secrets
imagePullSecrets: []

# Service account configuration
serviceAccount:
  create: false
  annotations: {}
  name: "default"

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}

# Security context
securityContext: {}

# Service configuration
service:
  type: ClusterIP
  port: 8000

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: spacebridge.io
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: spacebridge-tls
      hosts:
        - spacebridge.io
        - www.spacebridge.io
        - api.spacebridge.io
        - install.spacebridge.io

# Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity settings
affinity: {}

# Environment configuration
environment:
  spacebridgeUrl: "https://spacebridge.io"
  debug: false
  # Database settings
  databaseUrl: "postgresql://postgres:postgres@spacebridge-db-rw:5432/spacebridge"
  # JWT settings
  jwtSecret: "b6fe6fa9-cf7c-4798-8328-f778712062df"
  jwtAlgorithm: "HS256"
  jwtExpireMinutes: 60

# Configuration for external APIs
config:
  openai:
    apiKey: ""
  anthropic:
    apiKey: ""
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    fromName: "SpaceBridge"

# Database configuration
database:
  # If true, deploys a PostgreSQL instance using CloudNativePG
  enabled: true
  # If external is true, uses an external PostgreSQL instance
  external: false
  # External database configuration (if external is true)
  externalDatabase:
    host: ""
    port: 5432
    user: ""
    password: ""
    database: ""
  # CloudNativePG configuration (if enabled is true and external is false)
  cnpg:
    name: spacebridge-db
    instances: 1
    imageName: registry.spacecode.ai/spacecode/pgvector:16
    auth:
      username: postgres
      password: postgres
      database: spacebridge
    bootstrap:
      initdb:
        database: spacebridge
        owner: postgres
        postInitApplicationSQL:
          - CREATE EXTENSION vector;
    storage:
      size: 1Gi
      storageClass: ""
    resources:
      limits:
        cpu: 1500m
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 128Mi
    # PGVector extension for vector search
    pgvector:
      enabled: true

# Sentry configuration for error tracking
sentry:
  enabled: false
  # The DSN for your Sentry project
  dsn: ""

# Performance profiling configuration
profiling:
  enabled: false
  # Configuration for the PersistentVolumeClaim for storing profiling reports
  storage:
    pvc:
      # If true, a PVC will be created
      create: true
      # If undefined or null, the default StorageClass will be used.
      # Set to "-" to disable dynamic provisioning.
      storageClassName: ""
      # Size of the PVC
      size: 1Gi

# Datadog configuration
datadog:
  tracing:
    enabled: false
    # Set to true if you are running the Datadog agent as a DaemonSet
    daemonSet: true
    # The host and port of the Datadog agent
    host: "datadog-agent.datadog.svc.cluster.local"
    port: 8126
