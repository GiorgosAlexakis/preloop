# Default values for the SpaceBridge Helm chart

# Replica count for the deployment
replicaCount: 1

# Image configuration
image:
  repository: registry.spacecode.ai/spacecode/spacebridge
  pullPolicy: IfNotPresent
  tag: "latest"  # Overrides the image tag

# Image pull secrets
imagePullSecrets: []

# Service account configuration
serviceAccount:
  create: false
  annotations: {}
  name: "default"

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}

# Security context
securityContext: {}

# Service configuration
service:
  type: ClusterIP
  port: 8000

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: spacebridge.io
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    secretName: spacebridge-tls

# Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity settings
affinity: {}

# Environment configuration
environment:
  # Server settings
  host: "0.0.0.0"
  port: 8000
  debug: false
  # Database settings
  databaseUrl: "postgresql://postgres:postgres@spacebridge-db-rw:5432/spacebridge"
  # JWT settings
  jwtSecret: "b6fe6fa9-cf7c-4798-8328-f778712062df"
  jwtAlgorithm: "HS256"
  jwtExpireMinutes: 60

# Configuration for external APIs
config:
  openai:
    apiKey: ""
  anthropic:
    apiKey: ""

# Database configuration
database:
  # If true, deploys a PostgreSQL instance using CloudNativePG
  enabled: true
  # If external is true, uses an external PostgreSQL instance
  external: false
  # External database configuration (if external is true)
  externalDatabase:
    host: ""
    port: 5432
    user: ""
    password: ""
    database: ""
  # CloudNativePG configuration (if enabled is true and external is false)
  cnpg:
    name: spacebridge-db
    instances: 1
    imageName: registry.spacecode.ai/spacecode/pgvector:16
    auth:
      username: postgres
      password: postgres
      database: spacebridge
    bootstrap:
      initdb:
        database: spacebridge
        owner: postgres
        postInitApplicationSQL:
          - CREATE EXTENSION vector;
    storage:
      size: 1Gi
      storageClass: ""
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # PGVector extension for vector search
    pgvector:
      enabled: true
