apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "spacebridge.fullname" . }}-init-db-job
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "spacebridge.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: init-db-runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              python /app/spacesync/scripts/init_db.py --force && \
              cd /app/SpaceModels && \
              alembic stamp head
          env:
            - name: DATABASE_URL
              value: {{ include "spacebridge.databaseUrl" . }}
            - name: OPENAI_API_KEY
              value: {{ .Values.config.openai.apiKey }}
