{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "spacebridge.fullname" . }}-seed-job
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "spacebridge.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: seed-runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["python", "/app/scripts/seed_test_user.py"]
          env:
            - name: DATABASE_URL
              value: {{ .Values.environment.databaseUrl | quote }}
            - name: TEST_USER_EMAIL
              value: {{ .Values.seed.email | quote }}
            - name: TEST_USER_PASSWORD
              value: {{ .Values.seed.password | quote }}
            - name: TEST_USER_API_KEY
              value: {{ .Values.seed.apiKey | quote }}
{{- end }}
