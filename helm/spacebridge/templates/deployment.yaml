apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spacebridge.fullname" . }}
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spacebridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "spacebridge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "spacebridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HOST
              value: {{ .Values.environment.host | quote }}
            - name: PORT
              value: {{ .Values.environment.port | quote }}
            - name: DEBUG
              value: {{ .Values.environment.debug | quote }}
            - name: DATABASE_URL
              value: {{ .Values.environment.databaseUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: {{ .Values.environment.jwtAlgorithm | quote }}
            - name: JWT_EXPIRE_MINUTES
              value: {{ .Values.environment.jwtExpireMinutes | quote }}
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            {{- if .Values.config.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: openai-api-key
            {{- end }}
            {{- if .Values.config.gitlab.apiKey }}
            - name: GITLAB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: gitlab-api-key
            - name: GITLAB_API_URL
              value: {{ .Values.config.gitlab.apiUrl | quote }}
            {{- end }}
            {{- if .Values.config.github.apiKey }}
            - name: GITHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: github-api-key
            - name: GITHUB_API_URL
              value: {{ .Values.config.github.apiUrl | quote }}
            {{- end }}
            {{- if .Values.config.jira.apiKey }}
            - name: JIRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: jira-api-key
            - name: JIRA_API_URL
              value: {{ .Values.config.jira.apiUrl | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.environment.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
