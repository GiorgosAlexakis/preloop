{{- if .Values.agentExecution.namespace.create -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.agentExecution.namespace.name }}
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-execution
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
{{- end }}
