apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spacebridge.fullname" . }}-api
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "spacebridge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "spacebridge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "spacebridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SPACEBRIDGE_URL
              value: {{ .Values.environment.spacebridgeUrl | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: DEBUG
              value: {{ .Values.environment.debug | quote }}
            - name: DATABASE_URL
              value: {{ .Values.environment.databaseUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: {{ .Values.environment.jwtAlgorithm | quote }}
            - name: JWT_EXPIRE_MINUTES
              value: {{ .Values.environment.jwtExpireMinutes | quote }}
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            {{- if .Values.config.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: openai-api-key
            {{- end }}
            {{- if .Values.config.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: anthropic-api-key
            {{- end }}
            {{- if .Values.config.smtp.host }}
            - name: SMTP_HOST
              value: {{ .Values.config.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.config.smtp.port | quote }}
            - name: SMTP_USERNAME
              value: {{ .Values.config.smtp.username | quote }}
            - name: SMTP_PASSWORD
              value: {{ .Values.config.smtp.password | quote }}
            - name: SMTP_FROM
              value: {{ .Values.config.smtp.from | quote }}
            - name: SMTP_FROM_NAME
              value: {{ .Values.config.smtp.fromName | quote }}
            {{- end }}
            - name: NATS_URL
              value: {{ .Values.nats.url | default (printf "nats://%s-nats:4222" (include "spacebridge.fullname" .)) }}
            {{- if .Values.sentry.enabled }}
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "spacebridge.fullname" . }}
                  key: sentry-dsn
            {{- end }}
            - name: PROFILING_ENABLED
              value: {{ .Values.profiling.enabled | quote }}
            - name: STRIPE_SECRET_KEY
              value: {{ .Values.stripe.secretKey | quote }}
            - name: STRIPE_WEBHOOK_SECRET
              value: {{ .Values.stripe.webhookSecret | quote }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            {{- if .Values.profiling.enabled }}
            - name: profiling-storage
              mountPath: /tmp/profiling
            {{- end }}
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
      {{- if .Values.profiling.enabled }}
        - name: profiling-storage
          persistentVolumeClaim:
            claimName: {{ include "spacebridge.fullname" . }}-profiling
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
