{{- if .Values.agentExecution.rbac.create -}}
{{- $agentNamespace := .Values.agentExecution.namespace.create | ternary .Values.agentExecution.namespace.name .Release.Namespace -}}
---
# Role for managing agent containers
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spacebridge.fullname" . }}-agent-manager
  namespace: {{ $agentNamespace }}
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-execution
rules:
  # Permissions to manage Jobs for agent execution
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # EXPLICIT jobs/status permissions - required for checking job completion
  # Note: These are NOT included with "jobs" resource permissions
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get", "list"]
  # Permissions to read Pod status and logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Permissions to read Pod status
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "list"]

---
# RoleBinding to grant the SpaceBridge ServiceAccount access to manage agent containers
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spacebridge.fullname" . }}-agent-manager
  namespace: {{ $agentNamespace }}
  labels:
    {{- include "spacebridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-execution
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spacebridge.fullname" . }}-agent-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "spacebridge.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
