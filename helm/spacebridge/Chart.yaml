apiVersion: v2
name: spacebridge
description: A Helm chart for SpaceBridge - A Model Context Protocol (MCP) server for issue tracking systems

# A chart can be either an 'application' or a 'library' chart.
type: application

# Chart version
version: 0.1.0

# Application version
appVersion: "0.1.0"

# Keywords for the chart
keywords:
  - spacebridge
  - mcp
  - issue-tracking
  - jira
  - github
  - gitlab

# Home URL for the project
home: https://gitlab.spacecode.ai/spacecode/spacebridge

# Chart maintainers
maintainers:
  - name: SpaceCode Team
    email: support@spacecode.ai

# Icon for the chart (optional)
icon: http://spacebridge.io/assets/favicon.png

# Dependencies
# CloudNativePG operator should be installed in the cluster
# https://cloudnative-pg.io/documentation/1.22/

dependencies:
  - name: nats
    repository: "https://nats-io.github.io/k8s/helm/charts"
    version: "1.3.9"
    alias: nats
    condition: nats.enabled
