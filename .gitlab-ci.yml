image: alpine:3.22

variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/spacecode/spacebridge
  GIT_SUBMODULE_STRATEGY: "recursive"
  GITLAB_TOKEN: $GITLAB_TOKEN
  STAGING_DOMAIN: "staging.spacebridge.io"
  SENTRY_DSN: "https://8dc458f94e034fe891dc480fc4eeefd3@glitch.ina.sh/1"
  STRIPE_SECRET_KEY_PROD: $STRIPE_SECRET_KEY_PROD
  STRIPE_WEBHOOK_SECRET_PROD: $STRIPE_WEBHOOK_SECRET_PROD
  STRIPE_SECRET_KEY_STAGING: $STRIPE_SECRET_KEY_STAGING
  STRIPE_WEBHOOK_SECRET_STAGING: $STRIPE_WEBHOOK_SECRET_STAGING

cache:
  paths:
    - .pip-cache/

stages:
  - build
  - deploy
  - test
  - cleanup

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      --destination $CI_REGISTRY_IMAGE:latest
      --registry-mirror registry.spacecode.ai
      --registry-mirror $CI_REGISTRY
      --cache=true
      --cache-repo $CI_REGISTRY_IMAGE/cache
      --cache-ttl 168h
      --build-arg GITLAB_TOKEN=$GITLAB_TOKEN

pre-commit:
  stage: test
  needs: [build]
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  before_script:
    - apt-get update && apt-get install -y git
    - pip install -U pip pre-commit ruff
    - pip install --no-cache-dir -e ./SpaceModels && pip install --no-cache-dir -e ./spacesync
    - pip install -e ".[dev]"
    - cp -r /app/SpaceLit/dist ./SpaceLit/dist
  script:
    - pre-commit install
    - sleep 1
    - pre-commit run --all-files --show-diff
    - ruff check

pytest:
  stage: test
  needs: [build]
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  services:
    - name: pgvector/pgvector:pg13
      alias: postgres
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: postgresql://test_user:test_password@postgres:5432/test_db
  before_script:
    - pip install -U pip
    - pip install pytest pytest-cov loguru
    - pip install --no-cache-dir -e ./SpaceModels && pip install --no-cache-dir -e ./spacesync
    - pip install -e ".[dev]"
    - python ./spacesync/scripts/init_db.py --force

  script:
    - export ANTHROPIC_API_KEY="mock_openai_key"
    - export PYTHONPATH=$PYTHONPATH:.
    # Explicitly list top-level and SpaceModels tests, let pyproject.toml handle spacesync tests discovery
    - pytest -v --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=50

staging:
  stage: deploy
  image: dtzar/helm-kubectl:3.13.2
  when: manual
  environment:
    name: staging
  script:
    - export SPACELIT_COMMIT_SHA=$(cd SpaceLit && git rev-parse HEAD)
    - helm repo add nats https://nats-io.github.io/k8s/helm/charts
    - helm dependency update ./helm/spacebridge
    - helm dependency build ./helm/spacebridge
    - helm upgrade --install spacebridge ./helm/spacebridge
      --namespace spacebridge-staging
      --set image.tag=${CI_COMMIT_SHA}
      --set spacelit.tag=${SPACELIT_COMMIT_SHA}
      --set config.openai.apiKey=${OPENAI_API_KEY}
      --set config.anthropic.apiKey=${ANTHROPIC_API_KEY}
      --set config.smtp.host=${SMTP_HOST}
      --set config.smtp.port=${SMTP_PORT}
      --set config.smtp.username=${SMTP_USERNAME}
      --set config.smtp.password=${SMTP_PASSWORD}
      --set config.smtp.from=${SMTP_FROM}
      --set config.smtp.fromName=${SMTP_FROM_NAME}
      --set ingress.enabled=true
      --set ingress.hosts[0].host=${STAGING_DOMAIN}
      --set ingress.hosts[0].paths[0].path=/
      --set ingress.hosts[0].paths[0].pathType=ImplementationSpecific
      --set ingress.tls[0].hosts[0]=${STAGING_DOMAIN}
      --set ingress.tls[0].secretName=spacebridge-staging-tls
      --set environment.spacebridgeUrl=https://${STAGING_DOMAIN}
      --set sentry.enabled=true
      --set sentry.dsn=${SENTRY_DSN}
      --set profiling.enabled=false
      --set stripe.enabled=true
      --set stripe.secretKey=${STRIPE_SECRET_KEY_STAGING}
      --set stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET_STAGING}
      --set worker.pools[0].name=polling
      --set worker.pools[0].replicaCount=1
      --set worker.pools[0].tasks=poll_tracker
      --set worker.pools[1].name=notify
      --set worker.pools[1].replicaCount=1
      --set worker.pools[1].tasks=notify_admins
      --set worker.pools[2].name=webhook
      --set worker.pools[2].replicaCount=1
      --set worker.pools[2].tasks=process_webhook_event

    - echo "Helm deployment finished."
  artifacts:
    paths:
      - "db_backup_*.sql.xz"
    when: on_success
    expire_in: 7 days


prod:
  stage: deploy
  image: dtzar/helm-kubectl:3.13.2
  when: manual
  # only:
  #   - main
  #   # only for references that match a version string (v1.2.3)
  #   - /^v\d+\.\d+\.\d+$/
  environment:
    name: production
  script:
    - set -e
    - export SPACELIT_COMMIT_SHA=$(cd SpaceLit && git rev-parse HEAD)
    - export POD_BACKUP_PATH="/run/tmp/db_backup_$(date +%Y%m%d_%H%M%S).sql" # Changed extension
    - export LOCAL_BACKUP_FILENAME="db_backup_$(date +%Y%m%d_%H%M%S).sql" # Changed extension
    - echo "Starting database backup inside pod $DB_POD_NAME to $POD_BACKUP_PATH..."
    - kubectl exec -n spacebridge spacebridge-db-1 -- bash -c "pg_dump -U postgres -d spacebridge -F c -b -v -f $POD_BACKUP_PATH" # Removed --xz
    - echo "Backup created inside pod. Copying to runner..."
    - kubectl cp -n spacebridge spacebridge-db-1:$POD_BACKUP_PATH "$LOCAL_BACKUP_FILENAME"
    - echo "Compressing backup file on runner..."
    - apk add --no-cache xz # Ensure xz is available
    - xz "$LOCAL_BACKUP_FILENAME" # Compress the file locally
    - export LOCAL_COMPRESSED_FILENAME="$LOCAL_BACKUP_FILENAME.xz" # Define compressed filename variable
    - echo "Cleaning up backup file inside pod..."
    - kubectl exec -n spacebridge spacebridge-db-1 -- rm "$POD_BACKUP_PATH"
    - if [ -n "$S3_BUCKET" ] && [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_DEFAULT_REGION" ]; then apk add --no-cache aws-cli; echo "Uploading backup to S3 bucket $S3_BUCKET..."; aws s3 cp "$LOCAL_COMPRESSED_FILENAME" "s3://$S3_BUCKET/db/$LOCAL_COMPRESSED_FILENAME"; echo "Backup successfully uploaded to s3://$S3_BUCKET/db/$LOCAL_COMPRESSED_FILENAME"; else echo "S3 credentials not fully configured (S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION). Skipping S3 upload."; fi
    - echo "Starting Helm deployment..."
    - helm repo add nats https://nats-io.github.io/k8s/helm/charts
    - helm dependency update ./helm/spacebridge
    - helm dependency build ./helm/spacebridge
    - helm upgrade --install spacebridge ./helm/spacebridge
      --namespace spacebridge
      --set image.tag=${CI_COMMIT_SHA}
      --set spacelit.tag=${SPACELIT_COMMIT_SHA}
      --set config.openai.apiKey=${OPENAI_API_KEY}
      --set config.anthropic.apiKey=${ANTHROPIC_API_KEY}
      --set config.smtp.host=${SMTP_HOST}
      --set config.smtp.port=${SMTP_PORT}
      --set config.smtp.username=${SMTP_USERNAME}
      --set config.smtp.password=${SMTP_PASSWORD}
      --set config.smtp.from=${SMTP_FROM}
      --set config.smtp.fromName=${SMTP_FROM_NAME}
      --set ingress.enabled=true
      --set stripe.enabled=true
      --set stripe.secretKey=${STRIPE_SECRET_KEY_PROD}
      --set stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET_PROD}
      --set worker.pools[0].name=polling
      --set worker.pools[0].replicaCount=1
      --set worker.pools[0].tasks=poll_tracker
      --set worker.pools[1].name=notify
      --set worker.pools[1].replicaCount=1
      --set worker.pools[1].tasks=notify_admins
      --set worker.pools[2].name=webhook
      --set worker.pools[2].replicaCount=1
      --set worker.pools[2].tasks=process_webhook_event
    - echo "Helm deployment finished."
  artifacts:
    paths:
      - "db_backup_*.sql.xz"
    when: on_success
    expire_in: 7 days

test:
  when: always
  stage: deploy
  image: dtzar/helm-kubectl:3.13.2
  environment:
    name: test/$CI_COMMIT_REF_NAME
    url: https://$CI_COMMIT_REF_NAME.test.spacebridge.io
    on_stop: stop_test
    auto_stop_in: 4 hours
  only:
    - branches
  except:
    - main
  script:
    - set -e
    - export SPACELIT_COMMIT_SHA=$(cd SpaceLit && git rev-parse HEAD)
    - helm repo add nats https://nats-io.github.io/k8s/helm/charts
    - helm dependency update ./helm/spacebridge
    - helm dependency build ./helm/spacebridge
    - helm upgrade --install $CI_COMMIT_REF_NAME ./helm/spacebridge
      --namespace spacebridge-test
      --set image.tag=${CI_COMMIT_SHA}
      --set spacelit.tag=${SPACELIT_COMMIT_SHA}
      --set environment.spacebridgeUrl=https://$CI_COMMIT_REF_NAME.test.spacebridge.io
      --set ingress.enabled=true
      --set ingress.hosts[0].host=$CI_COMMIT_REF_NAME.test.spacebridge.io
      --set ingress.hosts[0].paths[0].path=/
      --set ingress.hosts[0].paths[0].pathType=ImplementationSpecific
      --set ingress.tls[0].hosts[0]=$CI_COMMIT_REF_NAME.test.spacebridge.io
      --set ingress.tls[0].secretName=spacebridge-test-tls
      --set ingress.tls[0].secretName=spacebridge-test-tls
      --set config.openai.apiKey=${OPENAI_API_KEY}
      --set config.anthropic.apiKey=${ANTHROPIC_API_KEY}
      --set config.smtp.host=${SMTP_HOST}
      --set config.smtp.port=${SMTP_PORT}
      --set config.smtp.username=${SMTP_USERNAME}
      --set config.smtp.password=${SMTP_PASSWORD}
      --set config.smtp.from=${SMTP_FROM}
      --set config.smtp.fromName=${SMTP_FROM_NAME}
      --set sentry.enabled=true
      --set profiling.enabled=false
      --set stripe.enabled=true
      --set stripe.secretKey=${STRIPE_SECRET_KEY_STAGING}
      --set stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET_STAGING}
      --set worker.pools[0].name=polling
      --set worker.pools[0].replicaCount=1
      --set worker.pools[0].tasks=poll_tracker
      --set worker.pools[1].name=notify
      --set worker.pools[1].replicaCount=1
      --set worker.pools[1].tasks=notify_admins
      --set worker.pools[2].name=webhook
      --set worker.pools[2].replicaCount=1
      --set worker.pools[2].tasks=process_webhook_event

test:integration:api:
  stage: test
  needs: [test]
  image: mcr.microsoft.com/playwright/python:v1.30.0-focal
  script:
    - pip install -e ".[dev]"
    - playwright install
    - export SPACEBRIDGE_TEST_URL=$CI_ENVIRONMENT_URL
    - pytest tests/integration/test_api.py

test:integration:ui:
  stage: test
  needs: [test]
  image: mcr.microsoft.com/playwright/python:v1.30.0-focal
  script:
    - pip install -e ".[dev]"
    - playwright install
    - export SPACEBRIDGE_TEST_URL=$CI_ENVIRONMENT_URL
    - pytest tests/integration/test_ui.py

stop_test:
  stage: cleanup
  needs: ["test:integration:api", "test:integration:ui"]
  image: dtzar/helm-kubectl:3.13.2
  when: always
  environment:
    name: test/$CI_COMMIT_REF_NAME
    action: stop
  only:
    - branches
  except:
    - main
  script:
    - helm delete $CI_COMMIT_REF_NAME --namespace spacebridge-test

smoke:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.30.0-focal
  script:
    - pip install -e ".[dev]"
    - playwright install
    - pytest tests/smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
