.stop-env:template:
  stage: cleanup
  needs: [
    "test:integration:ui",
    "test:integration:api:github",
    "test:integration:api:gitlab",
    "test:integration:api:jira"
  ]
  image: dtzar/helm-kubectl:3.13.2
  when: manual
  allow_failure: true
  environment:
    action: stop
  only:
    - branches
  script:
    - helm delete $CI_COMMIT_REF_NAME --namespace $NAMESPACE
    - kubectl delete job --namespace $NAMESPACE $CI_COMMIT_REF_NAME-preloop-migration-job $CI_COMMIT_REF_NAME-preloop-init-db-job $CI_COMMIT_REF_NAME-preloop-webhook-cleanup-job || true

