      --dockerfile $CI_PROJECT_DIR/scripts/examples/Dockerfile
      --destination $CI_REGISTRY_IMAGE/example-mcp-server:$CI_COMMIT_SHA
      --destination $CI_REGISTRY_IMAGE/example-mcp-server:latest
      --cache=true
      --cache-repo $CI_REGISTRY_IMAGE/cache
  when: manual
  only:
    - branches

deploy-example-mcp-server:
  stage: deploy
  needs: [build-example-mcp-server]
  image: dtzar/helm-kubectl:3.13.2
  when: manual
  environment:
    name: example-mcp/$CI_COMMIT_REF_NAME
    url: https://$CI_COMMIT_REF_NAME.example-mcp.preloop.ai
    on_stop: stop-example-mcp-server
    auto_stop_in: 4 hours
  variables:
    NAMESPACE: example-mcp-servers
    ENV_NAME: "$CI_COMMIT_REF_NAME"
    TARGET_DOMAIN: "$CI_COMMIT_REF_NAME.example-mcp.preloop.ai"
  script:
    - kubectl create namespace ${NAMESPACE} || true
    - helm upgrade --install ${ENV_NAME}-example-mcp ./scripts/examples/helm/example-mcp-server
      --namespace ${NAMESPACE}
      --set image.tag=${CI_COMMIT_SHA}
      --set image.repository=${CI_REGISTRY_IMAGE}/example-mcp-server
      --set ingress.hosts[0].host=${TARGET_DOMAIN}
      --set ingress.hosts[0].paths[0].path=/
      --set ingress.hosts[0].paths[0].pathType=ImplementationSpecific
      --set ingress.tls[0].hosts[0]=${TARGET_DOMAIN}
      --set ingress.tls[0].secretName=${ENV_NAME}-example-mcp-tls
      --set env[0].name=BEARER_TOKEN
      --set env[0].value=${EXAMPLE_MCP_BEARER_TOKEN:-test-token-12345}
    - echo "Example MCP Server deployed to https://${TARGET_DOMAIN}"
    - echo "Waiting for deployment to be ready..."
    - for i in $(seq 1 12); do
        curl -f https://${TARGET_DOMAIN}/health && break;
        sleep 5;
      done
  only:
    - branches

stop-example-mcp-server:
  stage: cleanup
  needs: [deploy-example-mcp-server]
  image: dtzar/helm-kubectl:3.13.2
  when: manual
  allow_failure: true
  environment:
    name: example-mcp/$CI_COMMIT_REF_NAME
    action: stop
  variables:
    NAMESPACE: example-mcp-servers
  script:
    - helm delete $CI_COMMIT_REF_NAME-example-mcp --namespace $NAMESPACE || true
  only:
    - branches
