image: python:3.10-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  POSTGRES_DB: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  # Disable PGVector in tests
  SPACEBRIDGE_DISABLE_PGVECTOR: "true"

stages:
  - lint
  - test
  - build
  - deploy

cache:
  paths:
    - .pip-cache/

# Install dependencies before each job
.install-deps: &install-deps
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[dev]"

# Lint jobs
black:
  <<: *install-deps
  stage: lint
  script:
    - black --check .

isort:
  <<: *install-deps
  stage: lint
  script:
    - isort --check .

ruff:
  <<: *install-deps
  stage: lint
  script:
    - ruff check .

mypy:
  <<: *install-deps
  stage: lint
  script:
    - mypy spacebridge tests

# Test jobs
test:
  <<: *install-deps
  stage: test
  services:
    - name: postgres:14-alpine
      alias: postgres
  script:
    - pytest --cov=spacebridge tests/
    - python -m pytest --cov-report term --cov-report xml:coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?|[1-9]?\d(?:\.\d+)?)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Build job
build:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_COMMIT_TAG

# Deploy jobs
deploy-staging:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_TAG