image: alpine:3.22

variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/spacecode/preloop-ai
  GIT_SUBMODULE_STRATEGY: "recursive"
  GITLAB_TOKEN: $GITLAB_TOKEN
  PROD_DOMAIN: "preloop.ai"
  STAGING_DOMAIN: "staging.preloop.ai"
  STRIPE_SECRET_KEY_PROD: $STRIPE_SECRET_KEY_PROD
  STRIPE_WEBHOOK_SECRET_PROD: $STRIPE_WEBHOOK_SECRET_PROD
  STRIPE_SECRET_KEY_STAGING: $STRIPE_SECRET_KEY_STAGING
  STRIPE_WEBHOOK_SECRET_STAGING: $STRIPE_WEBHOOK_SECRET_STAGING
  STRIPE_SECRET_KEY_TEST: $STRIPE_SECRET_KEY_TEST
  STRIPE_WEBHOOK_SECRET_TEST: $STRIPE_WEBHOOK_SECRET_TEST
  STRIPE_SECRET_KEY_REVIEW: $STRIPE_SECRET_KEY_REVIEW
  STRIPE_WEBHOOK_SECRET_REVIEW: $STRIPE_WEBHOOK_SECRET_REVIEW
  PRELOOP_TEST_PASSWORD: $PRELOOP_TEST_PASSWORD
  PRELOOP_TEST_USERNAME: $PRELOOP_TEST_USERNAME
  PRELOOP_TEST_EMAIL: $PRELOOP_TEST_EMAIL
  PRELOOP_TEST_API_KEY: $PRELOOP_TEST_API_KEY
  FF_TIMESTAMPS: "true"

cache:
  paths:
    - .pip-cache/

stages:
  - build
  - deploy
  - qa
  - cleanup

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    SENTRY_DSN:
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64 -w 0)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      --destination $CI_REGISTRY_IMAGE:latest
      --registry-mirror registry.spacecode.ai
      --registry-mirror $CI_REGISTRY
      --cache=true
      --cache-repo $CI_REGISTRY_IMAGE/cache
      --cache-ttl 168h
      --build-arg GITLAB_TOKEN=$GITLAB_TOKEN

pre-commit:
  stage: qa
  needs: [build]
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  before_script:
    - apt-get update && apt-get install -y git
    - pip install -U pip pre-commit ruff
    - pip install --no-cache-dir -e ./backend/preloop-models && pip install --no-cache-dir -e ./backend/preloop-sync
    - pip install -e ".[dev]"
  script:
    - pre-commit install
    - sleep 1
    - pre-commit run --all-files --show-diff
    - ruff check

.test:unit:template:
  stage: qa
  needs: [build]
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  services:
    - name: pgvector/pgvector:pg13
      alias: postgres
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: postgresql://test_user:test_password@postgres:5432/test_db
    SENTRY_DSN:
  before_script:
    - pip install -U pip
    - pip install pytest pytest-cov loguru
    - pip install --no-cache-dir -e ./backend/preloop-models && pip install --no-cache-dir -e ./backend/preloop-sync
    - pip install -e ".[dev]"
    - python ./backend/preloop-models/scripts/init_db.py --force
  script:
    - export ANTHROPIC_API_KEY="mock_openai_key"
    - export PYTHONPATH=$PYTHONPATH:.
    - export COVERAGE_FILE=".coverage.${CI_JOB_NAME}"
    - pytest -v --cov preloop-models --cov=preloop-sync --cov-report= --junitxml="report-${CI_JOB_NAME}.xml" $TEST_PATHS
  artifacts:
    paths:
      - ".coverage.*"
      - "report-*.xml"
    expire_in: 1 day

