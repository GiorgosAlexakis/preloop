<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore - SpaceBridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/spacebridge.css">
    <link rel="stylesheet" href="/static/css/explore.css">
    <script src="/static/js/tsne.js"></script>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
</head>
<body>
    <div id="deck-container"></div>
    <div id="tooltip"></div>

    <div id="left-panels">
        <div id="controls">
            <h5>Explore Embeddings</h5>
            <div class="input-group mb-3">
                <select id="projectSelect" class="form-select">
                    <option selected disabled>Loading projects...</option>
                </select>
            </div>

            <div>
                <a href="#collapseDuplicateSettings" data-bs-toggle="collapse" aria-expanded="false" aria-controls="collapseDuplicateSettings" class="settings-toggle text-decoration-none text-secondary fw-bold d-flex justify-content-between align-items-center mb-2">
                    Settings
                </a>
                <div class="collapse" id="collapseDuplicateSettings">
                    <label for="distanceThresholdSlider" class="form-label">Duplicate Threshold</label>
                    <div class="d-flex align-items-center">
                        <input type="range" class="form-range me-2" min="0" max="1" step="0.01" id="distanceThresholdSlider">
                        <input type="text" class="form-control" style="width: 80px;" id="distanceThresholdInput">
                    </div>
                </div>
            </div>

        </div>

        <div id="selection-panel" style="display: none;">
            <h5 class="mb-3">Selected Issues</h5>
            <ul id="selected-issues-list" class="list-group list-group-flush">
            </ul>
        </div>
    </div>

    <script>
        // --- Authentication --- //
        async function refreshToken() {
            const refreshToken = localStorage.getItem('refreshToken');
            if (!refreshToken) {
                logout();
                return null;
            }

            try {
                const response = await fetch('/api/v1/auth/token/refresh', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ refresh_token: refreshToken }),
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('accessToken', data.access_token);
                    localStorage.setItem('refreshToken', data.refresh_token);
                    return data.access_token;
                } else {
                    logout();
                    return null;
                }
            } catch (error) {
                console.error('Token refresh failed:', error);
                logout();
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = '/login?session_expired=true';
        }

        async function checkAuthStatus() {
            const accessToken = localStorage.getItem('accessToken');
            if (!accessToken) {
                window.location.href = '/login';
                return false;
            }
            // You could add a check here to see if the token is close to expiring
            // and refresh it proactively, but for now we'll rely on refreshing upon a 401.
            return true;
        }

        // --- API Fetch Wrapper --- //
        async function fetchWithAuth(url, options = {}) {
            let accessToken = localStorage.getItem('accessToken');
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json',
            };

            let response = await fetch(url, options);

            if (response.status === 401 || response.status === 403) { // Unauthorized or Forbidden
                console.log('Access token expired or invalid, attempting refresh...');
                const newAccessToken = await refreshToken();
                if (newAccessToken) {
                    options.headers['Authorization'] = `Bearer ${newAccessToken}`;
                    response = await fetch(url, options); // Retry the request with the new token
                } else {
                    // If refresh fails, the user is already redirected to login by refreshToken()
                    return null; // Stop further execution
                }
            }

            return response;
        }


        document.addEventListener('DOMContentLoaded', async () => {
            if (!await checkAuthStatus()) {
                return; // Stop script execution if not authenticated
            }

            const projectSelect = document.getElementById('projectSelect');
            const thresholdSlider = document.getElementById('distanceThresholdSlider');
            const thresholdInput = document.getElementById('distanceThresholdInput');

            let scatterplotData = []; // Store scatterplot data globally within this scope
            let selectedIssues = [];
            let isShiftDragging = false;
            let dragStartCoords = null;
            let dragEndCoords = null;
            let currentViewState = {
                target: [0, 0, 0],
                zoom: 1,
                // Add any other view state properties you might need like pitch, bearing
            };

            const deckgl = new deck.DeckGL({
                container: 'deck-container',
                viewState: currentViewState,
                onViewStateChange: ({viewState}) => {
                    currentViewState = viewState;
                    // We need to tell Deck.gl to re-render with the updated viewState
                    deckgl.setProps({viewState: currentViewState});
                },
                controller: {
                    scrollZoom: true,
                    dragPan: true,
                    doubleClickZoom: true
                },
                views: new deck.OrthographicView({
                    controller: true
                }),
                layers: [],
                onDragStart: handleDragStart,
                onDrag: handleDrag,
                onDragEnd: handleDragEnd,
                onClick: handleCanvasClick // Add top-level onClick handler
            });

            // Load initial threshold from storage or use a default
            let initialThreshold = localStorage.getItem('spacebridge_distanceThreshold') || 0.1;
            if (initialThreshold < 0) initialThreshold = 0.1; // Ensure it's within the new valid range
            thresholdSlider.value = initialThreshold;
            thresholdInput.value = initialThreshold;

            function handleCanvasClick(info, event) {
                // If shift key is pressed, let other handlers (layer onClick or drag) manage it.
                // Also, if an object was clicked (not an empty area), let layer-specific onClick handle it.
                if (event.srcEvent.shiftKey || info.object) {
                    return;
                }

                // If it's an empty area click (and not shift-clicking, and no object was clicked)
                if (selectedIssues.length > 0) {
                    selectedIssues = [];
                    renderLayers();
                    renderSelectionPanel();
                }
            }

            function handleDragStart(info, event) {
                if (event.srcEvent.shiftKey) {
                    isShiftDragging = true;
                    dragStartCoords = info.coordinate;
                    dragEndCoords = info.coordinate;
                    renderLayers();
                    return true; // Consume the event to prevent panning
                }
                return false;
            }

            function handleDrag(info, event) {
                if (isShiftDragging) {
                    dragEndCoords = info.coordinate;
                    renderLayers();
                    return true; // Consume the event
                }
                return false;
            }

            function handleDragEnd(info, event) {
                if (isShiftDragging) {
                    selectPointsInBox();
                    isShiftDragging = false;
                    dragStartCoords = null;
                    dragEndCoords = null;
                    renderLayers(); // To remove the rectangle
                    renderSelectionPanel();
                    return true; // Consume the event
                }
                return false;
            }

            function selectPointsInBox() {
                if (!dragStartCoords || !dragEndCoords) return;

                const [x1, y1] = dragStartCoords;
                const [x2, y2] = dragEndCoords;

                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);

                const pointsInBox = scatterplotData.filter(d => {
                    const [px, py] = d.position;
                    return px >= minX && px <= maxX && py >= minY && py <= maxY;
                });

                // Add to selection, avoiding duplicates
                pointsInBox.forEach(issue => {
                    if (!selectedIssues.some(selected => selected.issue_id === issue.issue_id)) {
                        selectedIssues.push(issue);
                    }
                });
            }

            function renderLayers() {
                const distanceThreshold = thresholdSlider.value;

                // --- Duplicate Detection ---
                const duplicates = [];
                if (scatterplotData.length > 1) {
                    for (let i = 0; i < scatterplotData.length; i++) {
                        for (let j = i + 1; j < scatterplotData.length; j++) {
                            const p1 = scatterplotData[i].position;
                            const p2 = scatterplotData[j].position;
                            const distance = Math.sqrt(Math.pow(p1[0] - p2[0], 2) + Math.pow(p1[1] - p2[1], 2));

                            if (distance < distanceThreshold) {
                                const midpoint = [(p1[0] + p2[0]) / 2, (p1[1] + p2[1]) / 2, 0];
                                duplicates.push({
                                    position: midpoint,
                                    issue1: scatterplotData[i].title,
                                    issue2: scatterplotData[j].title
                                });
                            }
                        }
                    }
                }

                const issueTypeColors = {
                    'bug': [255, 71, 71],        // Red
                    'feature': [71, 255, 153],   // Green
                    'task': [31, 133, 255],      // Blue
                    'default': [180, 180, 180]   // Gray
                };

                const getColor = (type) => {
                    if (!type) return issueTypeColors['default'];
                    const lowerType = type.toLowerCase();
                    if (lowerType.includes('bug')) return issueTypeColors['bug'];
                    if (lowerType.includes('feature')) return issueTypeColors['feature'];
                    if (lowerType.includes('task')) return issueTypeColors['task'];
                    return issueTypeColors['default'];
                };

                const duplicateIconLayer = new deck.IconLayer({
                    id: 'duplicate-icon-layer',
                    data: duplicates,
                    pickable: true,
                    iconAtlas: '/static/images/exclamation-warning-round-black-yellow-icon-alt.svg',
                    iconMapping: {
                        marker: {x: 0, y: 0, width: 512, height: 618, mask: false}
                    },
                    getIcon: d => 'marker',
                    sizeScale: 15,
                    getPosition: d => d.position,
                    getSize: d => 2.5,
                    getColor: d => [255, 255, 255], // Use white to not tint the icon
                    getPixelOffset: [0, -18.75],
                    onHover: info => {
                        const tooltip = document.getElementById('tooltip');
                        if (info.object) {
                            tooltip.style.display = 'block';
                            tooltip.style.left = `${info.x}px`;
                            tooltip.style.top = `${info.y}px`;
                            tooltip.innerHTML = `
                                <strong>Potential Duplicate Pair:</strong><br>
                                - ${info.object.issue1}<br>
                                - ${info.object.issue2}
                            `;
                        } else {
                            const scatterHover = deckgl.pickObject({x: info.x, y: info.y, layerIds: ['scatterplot-layer']});
                            if (!scatterHover) {
                                tooltip.style.display = 'none';
                            }
                        }
                    }
                });

                const scatterplotLayer = new deck.ScatterplotLayer({
                    id: 'scatterplot-layer',
                    data: scatterplotData,
                    pickable: true,
                    opacity: 0.95,
                    stroked: true,
                    filled: true,
                    radiusScale: 4,
                    radiusMinPixels: 1,
                    radiusMaxPixels: 10,
                    lineWidthUnits: 'pixels',
                    getLineWidth: d => selectedIssues.some(selected => selected.issue_id === d.issue_id) ? 4 : 2,
                    getPosition: d => d.position,
                    getFillColor: d => getColor(d.type),
                    getLineColor: d => selectedIssues.some(selected => selected.issue_id === d.issue_id) ? [255, 255, 0, 255] : [255, 255, 255, 100],
                    updateTriggers: {
                        getLineWidth: [selectedIssues.length],
                        getLineColor: [selectedIssues.length]
                    },
                    onHover: info => {
                        const tooltip = document.getElementById('tooltip');
                        if (info.object) {
                            const { title, type, labels } = info.object;
                            tooltip.style.display = 'block';
                            tooltip.style.left = `${info.x}px`;
                            tooltip.style.top = `${info.y}px`;
                            tooltip.innerHTML = `
                                <strong>${title}</strong>
                                Type: ${type || 'N/A'}<br>
                                Labels: ${labels && labels.length > 0 ? labels.join(', ') : 'None'}
                            `;
                        } else {
                            tooltip.style.display = 'none';
                        }
                    },
                    onClick: (info, event) => {
                        if (event.srcEvent.shiftKey) {
                            toggleSelection(info.object);
                        }
                    }
                });

                const layers = [scatterplotLayer, duplicateIconLayer];

                // Add selection rectangle layer if dragging
                if (isShiftDragging && dragStartCoords && dragEndCoords) {
                    const [x1, y1] = dragStartCoords;
                    const [x2, y2] = dragEndCoords;
                    const polygon = [
                        [x1, y1],
                        [x1, y2],
                        [x2, y2],
                        [x2, y1]
                    ];
                    layers.push(new deck.PolygonLayer({
                        id: 'selection-rectangle-layer',
                        data: [{polygon: polygon}],
                        pickable: false,
                        stroked: true,
                        filled: true,
                        getLineWidth: 0, // Explicitly set line width to 1 pixel
                        getPolygon: d => d.polygon,
                        getFillColor: [255, 255, 255, 50], // Transparent white fill
                        getLineColor: [200, 200, 200, 255]  // Light gray border, opaque
                    }));
                }

                deckgl.setProps({ layers: layers });
            }

            function toggleSelection(issue) {
                if (!issue || !issue.issue_id) return;

                const index = selectedIssues.findIndex(selected => selected.issue_id === issue.issue_id);

                if (index > -1) {
                    selectedIssues.splice(index, 1);
                } else {
                    selectedIssues.push(issue);
                }
                renderLayers(); // Add this line to re-render the scatterplot
                renderSelectionPanel();
            }

            function renderSelectionPanel() {
                const panel = document.getElementById('selection-panel');
                const list = document.getElementById('selected-issues-list');

                if (selectedIssues.length === 0) {
                    panel.style.display = 'none';
                    return;
                }

                panel.style.display = 'block';
                list.innerHTML = selectedIssues.map(issue => {
                    return `<li class="list-group-item d-flex justify-content-between align-items-center" data-issue-id="${issue.issue_id}">
                                <span class="text-truncate" title="${issue.title}">${issue.title}</span>
                            </li>`;
                }).join('');
            }

            thresholdSlider.addEventListener('input', () => {
                thresholdInput.value = thresholdSlider.value;
                localStorage.setItem('spacebridge_distanceThreshold', thresholdSlider.value);
                renderLayers();
            });

            thresholdInput.addEventListener('input', () => {
                let value = parseFloat(thresholdInput.value.trim());
                if (isNaN(value) || value < 0) {
                    value = 0;
                } else if (value > 1) {
                    value = 1;
                }
                thresholdSlider.value = value;
                thresholdInput.value = value; // Correct the input field if the value was invalid/out of bounds
                localStorage.setItem('spacebridge_distanceThreshold', value);
                renderLayers();
            });

            try {
                const response = await fetchWithAuth('/api/v1/projects');

                if (response && response.ok) {
                    const projects = await response.json();
                    if (projects.length > 0) {
                        projectSelect.innerHTML = projects.map(p => `<option value="${p.name}">${p.name}</option>`).join('');

                        // Get the last selected project from localStorage
                        const lastSelectedProject = localStorage.getItem('spacebridge_lastSelectedProject');
                        let projectToLoad;

                        // Check if the last selected project still exists in the current projects list
                        if (lastSelectedProject && projects.some(p => p.name === lastSelectedProject)) {
                            projectToLoad = lastSelectedProject;
                            projectSelect.value = lastSelectedProject;
                        } else {
                            // Fall back to the first project if last selected doesn't exist
                            projectToLoad = projects[0].name;
                            projectSelect.value = projects[0].name;
                        }

                        // Load the selected project
                        await fetchAndVisualize(projectToLoad);
                    } else {
                        projectSelect.innerHTML = '<option selected disabled>No projects found.</option>';
                    }
                } else {
                    const errorResult = await response.json();
                    projectSelect.innerHTML = `<option selected disabled>Error loading projects: ${errorResult.detail || 'Unknown error'}</option>`;
                }
            } catch (error) {
                console.error('Error fetching projects:', error);
                projectSelect.innerHTML = '<option selected disabled>An error occurred.</option>';
            }

            projectSelect.addEventListener('change', async () => {
                const selectedProjectName = projectSelect.value;

                // Save the selected project to localStorage
                localStorage.setItem('spacebridge_lastSelectedProject', selectedProjectName);

                await fetchAndVisualize(selectedProjectName);
            });

            async function fetchAndVisualize(projectName) {
                if (!projectName) {
                    return;
                }

                // Clear selection when loading new project
                selectedIssues = [];
                renderSelectionPanel();

                deckgl.setProps({ layers: [] }); // Clear previous visualization

                try {
                    const response = await fetchWithAuth(`/api/v1/embeddings/projects/${projectName}/embeddings`);

                    if (!response) return; // Stop if auth failed and user was redirected

                    const result = await response.json();

                    if (response.ok) {
                        const rawData = result.data;
                        console.log(rawData);
                        if (rawData && rawData.length > 0) {

                            // Filter out items that don't have a valid embedding to prevent errors.
                            const validData = rawData.filter(item => item && item.embedding && Array.isArray(item.embedding) && item.embedding.length > 0);

                            if (validData.length === 0) {
                                console.log('No valid embeddings found to visualize.');
                                scatterplotData = [];
                                renderLayers();
                                return; // Exit if no data is left after filtering
                            }

                            if (validData.length === 1) {
                                // Handle single data point case without t-SNE
                                const item = validData[0];
                                scatterplotData = [{
                                    position: [0, 0, 0],
                                    issue_id: item.issue_id,
                                    title: item.issue_title,
                                    labels: item.issue_labels,
                                    type: item.issue_type,
                                }];
                                console.log("Only one issue found, skipping t-SNE.");
                            } else {
                                // Proceed with t-SNE for multiple data points
                                const highDimensionalData = validData.map(item => item.embedding);

                                const tsne = new tsnejs.tSNE({
                                    dim: 2,
                                    // Perplexity must be less than the number of points.
                                    perplexity: Math.max(1, Math.min(30, validData.length - 1)),
                                    metric: "cosine"
                                });

                                tsne.initDataRaw(highDimensionalData);

                                for(var i = 0; i < 1500; i++) { // Reduced steps for faster interaction
                                    tsne.step();
                                }

                                const solution = tsne.getSolution();
                                scatterplotData = solution.map((point, index) => ({
                                    position: [point[0], point[1], 0],
                                    issue_id: validData[index].issue_id, // Use validData to keep indices aligned
                                    title: validData[index].issue_title,
                                    labels: validData[index].issue_labels, // Will be null if not sent, tooltip handles this
                                    type: validData[index].issue_type,
                                }));
                            }

                            renderLayers();

                            // Zoom to fit data
                            if (scatterplotData.length > 0) {
                                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                                scatterplotData.forEach(d => {
                                    minX = Math.min(minX, d.position[0]);
                                    maxX = Math.max(maxX, d.position[0]);
                                    minY = Math.min(minY, d.position[1]);
                                    maxY = Math.max(maxY, d.position[1]);
                                });

                                const centerX = (minX + maxX) / 2;
                                const centerY = (minY + maxY) / 2;
                                const dataWidth = maxX - minX;
                                const dataHeight = maxY - minY;

                                const viewportWidth = deckgl.width;
                                const viewportHeight = deckgl.height;
                                let newZoom;

                                if (dataWidth === 0 && dataHeight === 0) { // Single point or all points identical
                                    newZoom = 0; // Default zoom, shows point at reasonable size
                                } else {
                                    const dataSpan = Math.max(dataWidth, dataHeight) || 1;
                                    const viewSpan = Math.min(viewportWidth, viewportHeight);
                                    // Calculate pixels per world unit, aiming for 80% coverage
                                    const pixelsPerWorldUnit = (viewSpan * 0.8) / dataSpan;
                                    newZoom = Math.log2(pixelsPerWorldUnit);
                                }

                                // Update our managed view state
                                currentViewState = {
                                    ...currentViewState, // Preserve other properties like pitch/bearing if any
                                    target: [centerX, centerY, 0],
                                    zoom: newZoom,
                                    transitionDuration: 500,
                                    transitionInterpolator: new deck.LinearInterpolator(['target', 'zoom'])
                                };
                                // Tell Deck.gl to use the updated view state
                                deckgl.setProps({ viewState: currentViewState });
                            }
                        } else {
                            scatterplotData = [];
                            renderLayers();
                        }
                    } else {
                        scatterplotData = [];
                        renderLayers();
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    scatterplotData = [];
                    renderLayers();
                }
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
