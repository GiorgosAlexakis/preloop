# Preloop OSS Railway trial scaffold.
#
# Railway can import this Compose file to stage the services for a template.
# The published template should use the variable map in template-services.yaml so
# generated secrets and service references are owned by Railway, not hardcoded.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: preloop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: ghcr.io/preloop/preloop:${PRELOOP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/preloop
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      PORT: 8000
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOW_ALL_ORIGINS: "true"
      PRELOOP_SERVICE_ROLE: all
      PRELOOP_URL: ${PRELOOP_URL:-http://localhost:3000}
    command: sh scripts/start_trial_api.sh

  worker-scheduler:
    image: ghcr.io/preloop/preloop:${PRELOOP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/preloop
      NATS_URL: nats://nats:4222
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: sh scripts/run_trial_worker_scheduler.sh

  console:
    image: ghcr.io/preloop/console:${PRELOOP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    environment:
      API_URL: http://api-gateway:8000
      GATEWAY_URL: http://api-gateway:8000

volumes:
  postgres-data:
