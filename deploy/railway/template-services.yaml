# Source-of-truth map for the Preloop OSS Railway trial template.
#
# Railway templates are created in Railway's template composer. Keep this file in
# sync with the published template so README instructions and the deploy button
# describe the same topology.

shared_variables:
  PRELOOP_VERSION: latest
  LOG_LEVEL: INFO
  SECRET_KEY: ${{secret(64, "abcdef0123456789")}}
  POSTGRES_PASSWORD: ${{secret(32)}}

services:
  postgres:
    source:
      image: pgvector/pgvector:pg16
    public_networking: false
    volume:
      mount_path: /var/lib/postgresql/data
      name: postgres-data
    variables:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${{shared.POSTGRES_PASSWORD}}
      POSTGRES_DB: preloop

  nats:
    source:
      image: nats:alpine
    public_networking: false
    start_command: nats-server -js -m 8222

  api-gateway:
    source:
      image: ghcr.io/preloop/preloop:${{shared.PRELOOP_VERSION}}
    public_networking: false
    healthcheck_path: /api/v1/health
    start_command: sh scripts/start_trial_api.sh
    variables:
      DATABASE_URL: postgresql+psycopg://postgres:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/preloop
      NATS_URL: nats://${{nats.RAILWAY_PRIVATE_DOMAIN}}:4222
      HOST: 0.0.0.0
      PORT: "8000"
      SECRET_KEY: ${{shared.SECRET_KEY}}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      LOG_LEVEL: ${{shared.LOG_LEVEL}}
      ALLOW_ALL_ORIGINS: "true"
      PRELOOP_SERVICE_ROLE: all
      PRELOOP_URL: https://${{console.RAILWAY_PUBLIC_DOMAIN}}

  worker-scheduler:
    source:
      image: ghcr.io/preloop/preloop:${{shared.PRELOOP_VERSION}}
    public_networking: false
    start_command: sh scripts/run_trial_worker_scheduler.sh
    variables:
      DATABASE_URL: postgresql+psycopg://postgres:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/preloop
      NATS_URL: nats://${{nats.RAILWAY_PRIVATE_DOMAIN}}:4222
      SECRET_KEY: ${{shared.SECRET_KEY}}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      LOG_LEVEL: ${{shared.LOG_LEVEL}}

  console:
    source:
      image: ghcr.io/preloop/console:${{shared.PRELOOP_VERSION}}
    public_networking: true
    healthcheck_path: /health
    variables:
      API_URL: http://${{api-gateway.RAILWAY_PRIVATE_DOMAIN}}:8000
      GATEWAY_URL: http://${{api-gateway.RAILWAY_PRIVATE_DOMAIN}}:8000
