services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: preloop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nats:
    image: nats:alpine
    restart: unless-stopped
    ports:
      - "4222:4222" # Client port
      - "8222:8222" # Monitoring port
    command: [ "-js" ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/preloop/preloop:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres/preloop
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: 'true'
      SECRET_KEY: development_secret_key_do_not_use_in_production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: DEBUG
      INIT_TEST_DATA: 'true'
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ./start.sh

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/preloop/preloop:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres/preloop
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: 'true'
      SECRET_KEY: development_secret_key_do_not_use_in_production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: DEBUG
      INIT_TEST_DATA: 'true'
    volumes:
      - .:/app
    command: preloop-sync scheduler

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/preloop/preloop:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - nats
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres/preloop
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: 'true'
      SECRET_KEY: development_secret_key_do_not_use_in_production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: DEBUG
      INIT_TEST_DATA: 'true'
    volumes:
      - .:/app
    command: preloop-sync worker

volumes:
  postgres-data:
