  <script type="module"

  <!-- Critical CSS to prevent FOUC (Flash of Unstyled Content) -->
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    }

    /* Hide unhydrated web components until they're defined */
    landing-view:not(:defined),
    static-view-wrapper:not(:defined),
    static-view:not(:defined),
    app-header:not(:defined),
    app-footer:not(:defined),
    public-pricing-view:not(:defined) {
      opacity: 0;
      display: block;
    }

    /* Once defined, fade them in smoothly */
    landing-view:defined,
    static-view-wrapper:defined,
    static-view:defined,
    app-header:defined,
    app-footer:defined,
    public-pricing-view:defined {
      opacity: 1;
      transition: opacity 0.2s ease-in;
    }

    /* Loading indicator — injected by JS so it never shows in static snapshots */
    #app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: #0d1117;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app-loading::before {
      content: '> ';
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 1.5rem;
      color: #58a6ff;
      white-space: nowrap;
    }

    #app-loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      height: 24px;
      background-color: #58a6ff;
      animation: blink 1s step-end infinite;
    }

    #app-loading.fade-out {
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      50.01%,
      100% {
        opacity: 0;
      }
    }
  </style>

  <link rel="stylesheet" href="/src/main.css">
</head>

<body>
  <lit-app></lit-app>
  <script>
    // Inject loading indicator via JS so it never appears in static snapshots
    // (e.g. Wayback Machine) where JS doesn't execute.
    (function () {
      var el = document.createElement('div');
      el.id = 'app-loading';
      document.body.prepend(el);

      function removeLoader() {
        if (!el.parentNode) return;
        el.classList.add('fade-out');
        el.addEventListener('transitionend', function () { el.remove(); });
        // Fallback if transitionend doesn't fire
        setTimeout(function () { el.remove(); }, 300);
      }

      // Remove once lit-app is defined
      if (customElements.get('lit-app')) {
        removeLoader();
      } else {
        customElements.whenDefined('lit-app').then(removeLoader);
      }

      // Safety timeout — remove after 8s regardless
      setTimeout(removeLoader, 8000);
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
