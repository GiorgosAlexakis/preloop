openapi: 3.1.0
info:
  title: SpaceBridge API
  description: REST API for SpaceBridge issue tracking management
  version: 0.1.0
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register
      description: "Register a new user.\n\nArgs:\n    user_data: User creation data.\n\
        \    background_tasks: Background tasks for sending emails.\n\nReturns:\n\
        \    The created user.\n\nRaises:\n    HTTPException: If the username or email\
        \ is already taken."
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify Email
      description: "Verify a user's email address.\n\nArgs:\n    verification_data:\
        \ Email verification data with token.\n\nReturns:\n    Success message.\n\n\
        Raises:\n    HTTPException: If the token is invalid or the user does not exist."
      operationId: verify_email_api_v1_auth_verify_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Verify Email Api V1 Auth Verify Email Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot Password
      description: "Send a password reset email.\n\nArgs:\n    reset_data: Password\
        \ reset request with email.\n    background_tasks: Background tasks for sending\
        \ emails.\n\nReturns:\n    Success message."
      operationId: forgot_password_api_v1_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Forgot Password Api V1 Auth Forgot Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset Password
      description: "Reset a user's password.\n\nArgs:\n    reset_data: Password reset\
        \ confirmation with token and new password.\n\nReturns:\n    Success message.\n\
        \nRaises:\n    HTTPException: If the token is invalid or the user does not\
        \ exist."
      operationId: reset_password_api_v1_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Reset Password Api V1 Auth Reset Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token:
    post:
      tags:
      - Auth
      summary: Login Form
      description: "Login to get an access token using form data (required for OAuth2\
        \ flow).\n\nArgs:\n    form_data: OAuth2 password request form.\n\nReturns:\n\
        \    Access token.\n\nRaises:\n    HTTPException: If the username or password\
        \ is incorrect."
      operationId: login_form_api_v1_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_form_api_v1_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token/json:
    post:
      tags:
      - Auth
      summary: Login Json
      description: "Login to get an access token using JSON data.\n\nArgs:\n    request:\
        \ Login request with username and password.\n\nReturns:\n    Access token.\n\
        \nRaises:\n    HTTPException: If the username or password is incorrect."
      operationId: login_json_api_v1_auth_token_json_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh Token
      description: "Refresh an access token using a refresh token.\n\nArgs:\n    request:\
        \ Refresh token request.\n\nReturns:\n    New access token.\n\nRaises:\n \
        \   HTTPException: If the refresh token is invalid or expired."
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/users/me:
    get:
      tags:
      - Auth
      summary: Read Users Me
      description: "Get the current user.\n\nArgs:\n    current_user: The current\
        \ user.\n\nReturns:\n    The current user."
      operationId: read_users_me_api_v1_auth_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys:
    get:
      tags:
      - Auth
      summary: List Api Keys
      description: "List all API keys for the current user.\n\nArgs:\n    current_user:\
        \ The current authenticated user.\n\nReturns:\n    List of API keys."
      operationId: list_api_keys_api_v1_auth_api_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeySummary'
                type: array
                title: Response List Api Keys Api V1 Auth Api Keys Get
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - Auth
      summary: Create Api Key
      description: "Create a new API key.\n\nArgs:\n    key_data: The key creation\
        \ data.\n    current_user: The current authenticated user.\n\nReturns:\n \
        \   The created API key details."
      operationId: create_api_key_api_v1_auth_api_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys/debug:
    get:
      tags:
      - Auth
      summary: Debug Api Keys
      description: "Debug endpoint to get API keys with their values (admin only).\n\
        \nArgs:\n    username: The username to get keys for\n    api_key: Optional\
        \ specific API key to look up\n    current_user: The current authenticated\
        \ user.\n\nReturns:\n    List of API keys with their values."
      operationId: debug_api_keys_api_v1_auth_api_keys_debug_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
          title: Username
      - name: api_key
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                title: Response Debug Api Keys Api V1 Auth Api Keys Debug Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-keys/{key_id}:
    delete:
      tags:
      - Auth
      summary: Delete Api Key
      description: "Delete an API key.\n\nArgs:\n    key_id: The ID of the key to\
        \ delete.\n    current_user: The current authenticated user.\n\nRaises:\n\
        \    HTTPException: If the key doesn't exist or doesn't belong to the user."
      operationId: delete_api_key_api_v1_auth_api_keys__key_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-usage:
    get:
      tags:
      - Auth
      summary: Get Api Usage
      description: "Get API usage statistics for the current user.\n\nArgs:\n    start_date:\
        \ Optional start date for filtering.\n    end_date: Optional end date for\
        \ filtering.\n    current_user: The current authenticated user.\n\nReturns:\n\
        \    API usage statistics."
      operationId: get_api_usage_api_v1_auth_api_usage_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Date
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Date
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUsageStatistics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/health/health:
    get:
      tags:
      - Health
      summary: Health Check
      description: Health check endpoint.
      operationId: health_check_api_v1_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Check Api V1 Health Health Get
  /api/v1/version/version:
    get:
      tags:
      - Version
      summary: Get Version Info
      description: 'Returns the server version information and logs the client version.


        Accepts an optional `X-Client-Version` header from the client.

        If an `Authorization: Bearer <token>` header is provided and valid,

        the associated account ID will also be logged.'
      operationId: get_version_info_api_v1_version_version_get
      parameters:
      - name: X-Client-Version
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Version
      - name: X-Client-Organization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Organization
      - name: X-Client-Project
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Project
      - name: X-Additional-Info
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Additional-Info
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/trackers/trackers/debug:
    post:
      tags:
      - Trackers
      summary: Debug Tracker Request
      description: Debug endpoint to see raw request data
      operationId: debug_tracker_request_api_v1_trackers_trackers_debug_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - bearerAuth: []
  /api/v1/trackers/trackers:
    get:
      tags:
      - Trackers
      summary: List Trackers
      description: List all non-deleted trackers for the current user.
      operationId: list_trackers_api_v1_trackers_trackers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TrackerResponse'
                type: array
                title: Response List Trackers Api V1 Trackers Trackers Get
      security:
      - bearerAuth: []
    post:
      tags:
      - Trackers
      summary: Register Tracker
      description: "Register a new issue tracker.\n\nArgs:\n    tracker_data: Tracker\
        \ registration data.\n    background_tasks: Background tasks for sending emails.\n\
        \    current_user: The current authenticated user.\n\nReturns:\n    The registered\
        \ tracker ID.\n\nRaises:\n    HTTPException: If registration fails."
      operationId: register_tracker_api_v1_trackers_trackers_post
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Register Tracker Api V1 Trackers Trackers Post
      security:
      - bearerAuth: []
  /api/v1/trackers/trackers/{tracker_id}:
    get:
      tags:
      - Trackers
      summary: Get Tracker
      description: Get a non-deleted tracker by ID, ensuring it belongs to the current
        user.
      operationId: get_tracker_api_v1_trackers_trackers__tracker_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Trackers
      summary: Update Tracker
      description: Update an existing tracker.
      operationId: update_tracker_api_v1_trackers_trackers__tracker_id__put
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Trackers
      summary: Delete Tracker
      description: Delete a tracker by ID (soft delete by default, hard delete if
        specified).
      operationId: delete_tracker_api_v1_trackers_trackers__tracker_id__delete
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      - name: hard_delete
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Hard Delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Tracker Api V1 Trackers Trackers  Tracker Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/trackers/trackers/test-and-list-projects:
    post:
      tags:
      - Trackers
      summary: Test Connection And List Projects
      description: "Tests connection to a tracker with provided credentials and lists\
        \ accessible projects.\nDoes not save the tracker configuration.\n\nArgs:\n\
        \    test_data: Temporary tracker connection details.\n    current_user: The\
        \ authenticated user performing the test.\n\nReturns:\n    TrackerTestResponse\
        \ indicating success/failure and the project list if successful."
      operationId: test_connection_and_list_projects_api_v1_trackers_trackers_test_and_list_projects_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/organizations/organizations:
    post:
      tags:
      - Organizations
      summary: Create Organization
      description: Create a new organization, ensuring it's linked to the current
        user's tracker.
      operationId: create_organization_api_v1_organizations_organizations_post
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Organizations
      summary: List Organizations
      description: List organizations accessible to the current user.
      operationId: list_organizations_api_v1_organizations_organizations_get
      security:
      - bearerAuth: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/organizations/organizations/{organization_id}:
    get:
      tags:
      - Organizations
      summary: Get Organization
      description: Get an organization by ID, ensuring user has access.
      operationId: get_organization_api_v1_organizations_organizations__organization_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          title: Organization Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Organizations
      summary: Update Organization
      description: Update an organization, ensuring user has access.
      operationId: update_organization_api_v1_organizations_organizations__organization_id__put
      security:
      - bearerAuth: []
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          title: Organization Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Organizations
      summary: Delete Organization
      description: Delete an organization, ensuring user has access.
      operationId: delete_organization_api_v1_organizations_organizations__organization_id__delete
      security:
      - bearerAuth: []
      parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          title: Organization Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/organizations/organizations/by-identifier/{identifier}:
    get:
      tags:
      - Organizations
      summary: Get Organization By Identifier
      description: Get an organization by identifier, ensuring user has access.
      operationId: get_organization_by_identifier_api_v1_organizations_organizations_by_identifier__identifier__get
      security:
      - bearerAuth: []
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
          title: Identifier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/projects/projects:
    post:
      tags:
      - Projects
      summary: Create Project
      description: Create a new project, ensuring user has access to the organization.
      operationId: create_project_api_v1_projects_projects_post
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Projects
      summary: List Projects
      description: List projects accessible to the current user, optionally filtered
        by organization.
      operationId: list_projects_api_v1_projects_projects_get
      security:
      - bearerAuth: []
      parameters:
      - name: organization_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Organization Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectResponse'
                title: Response List Projects Api V1 Projects Projects Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
