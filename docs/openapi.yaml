openapi: 3.1.0
info:
  title: SpaceBridge API
  description: REST API for SpaceBridge issue tracking management
  version: 0.1.0
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register
      description: "Register a new user.\n\nArgs:\n    user_data: User creation data.\n\
        \    background_tasks: Background tasks for sending emails.\n    request:\
        \ The incoming request object.\n\nReturns:\n    The created user.\n\nRaises:\n\
        \    HTTPException: If the username or email is already taken."
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify Email
      description: "Verify a user's email address.\n\nArgs:\n    verification_data:\
        \ Email verification data with token.\n\nReturns:\n    Success message.\n\n\
        Raises:\n    HTTPException: If the token is invalid or the user does not exist."
      operationId: verify_email_api_v1_auth_verify_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Verify Email Api V1 Auth Verify Email Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot Password
      description: "Send a password reset email.\n\nArgs:\n    reset_data: Password\
        \ reset request with email.\n    background_tasks: Background tasks for sending\
        \ emails.\n\nReturns:\n    Success message."
      operationId: forgot_password_api_v1_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Forgot Password Api V1 Auth Forgot Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset Password
      description: "Reset a user's password.\n\nArgs:\n    reset_data: Password reset\
        \ confirmation with token and new password.\n\nReturns:\n    Success message.\n\
        \nRaises:\n    HTTPException: If the token is invalid or the user does not\
        \ exist."
      operationId: reset_password_api_v1_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Reset Password Api V1 Auth Reset Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token:
    post:
      tags:
      - Auth
      summary: Login Form
      description: "Login to get an access token using form data (required for OAuth2\
        \ flow).\n\nArgs:\n    form_data: OAuth2 password request form.\n\nReturns:\n\
        \    Access token.\n\nRaises:\n    HTTPException: If the username or password\
        \ is incorrect."
      operationId: login_form_api_v1_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_form_api_v1_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token/json:
    post:
      tags:
      - Auth
      summary: Login Json
      description: "Login to get an access token using JSON data.\n\nArgs:\n    request:\
        \ Login request with username and password.\n\nReturns:\n    Access token.\n\
        \nRaises:\n    HTTPException: If the username or password is incorrect."
      operationId: login_json_api_v1_auth_token_json_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh Token
      description: "Refresh an access token using a refresh token.\n\nArgs:\n    request:\
        \ Refresh token request.\n\nReturns:\n    New access token.\n\nRaises:\n \
        \   HTTPException: If the refresh token is invalid or expired."
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/users/me:
    get:
      tags:
      - Auth
      summary: Read Users Me
      description: "Get the current user.\n\nArgs:\n    current_user: The current\
        \ user.\n\nReturns:\n    The current user."
      operationId: read_users_me_api_v1_auth_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - Auth
      summary: Update User Me
      description: Update own user.
      operationId: update_user_me_api_v1_auth_users_me_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/users/me/password:
    put:
      tags:
      - Auth
      summary: Change Current User Password
      description: Change current user's password.
      operationId: change_current_user_password_api_v1_auth_users_me_password_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys:
    get:
      tags:
      - Auth
      summary: List Api Keys
      description: "List all API keys for the current user.\n\nArgs:\n    current_user:\
        \ The current authenticated user.\n\nReturns:\n    List of API keys."
      operationId: list_api_keys_api_v1_auth_api_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeySummary'
                type: array
                title: Response List Api Keys Api V1 Auth Api Keys Get
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - Auth
      summary: Create Api Key
      description: "Create a new API key.\n\nArgs:\n    key_data: The key creation\
        \ data.\n    current_user: The current authenticated user.\n\nReturns:\n \
        \   The created API key details."
      operationId: create_api_key_api_v1_auth_api_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys/debug:
    get:
      tags:
      - Auth
      summary: Debug Api Keys
      description: "Debug endpoint to get API keys with their values (admin only).\n\
        \nArgs:\n    username: The username to get keys for\n    api_key: Optional\
        \ specific API key to look up\n    current_user: The current authenticated\
        \ user.\n\nReturns:\n    List of API keys with their values."
      operationId: debug_api_keys_api_v1_auth_api_keys_debug_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
          title: Username
      - name: api_key
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                title: Response Debug Api Keys Api V1 Auth Api Keys Debug Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-keys/{key_id}:
    delete:
      tags:
      - Auth
      summary: Delete Api Key
      description: "Delete an API key.\n\nArgs:\n    key_id: The ID of the key to\
        \ delete.\n    current_user: The current authenticated user.\n\nRaises:\n\
        \    HTTPException: If the key doesn't exist or doesn't belong to the user."
      operationId: delete_api_key_api_v1_auth_api_keys__key_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-usage:
    get:
      tags:
      - Auth
      summary: Get Api Usage
      description: "Get API usage statistics for the current user.\n\nArgs:\n    start_date:\
        \ Optional start date for filtering.\n    end_date: Optional end date for\
        \ filtering.\n    current_user: The current authenticated user.\n\nReturns:\n\
        \    API usage statistics."
      operationId: get_api_usage_api_v1_auth_api_usage_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Date
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Date
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUsageStatistics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/complete-onboarding:
    post:
      tags:
      - Auth
      summary: Complete Onboarding
      description: 'Completes the onboarding for a new user created via Stripe checkout.

        Sets the password and updates the username.'
      operationId: complete_onboarding_api_v1_auth_complete_onboarding_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Health Check
      description: Health check endpoint.
      operationId: health_check_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Check Api V1 Health Get
  /api/v1/version:
    get:
      tags:
      - Version
      summary: Get Version Info
      description: 'Returns the server version information and logs the client version.


        Accepts an optional `X-Client-Version` header from the client.

        If an `Authorization: Bearer <token>` header is provided and valid,

        the associated account ID will also be logged.'
      operationId: get_version_info_api_v1_version_get
      parameters:
      - name: X-Client-Version
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Version
      - name: X-Client-Organization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Organization
      - name: X-Client-Project
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Client-Project
      - name: X-Additional-Info
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Additional-Info
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/trackers/debug:
    post:
      tags:
      - Trackers
      summary: Debug Tracker Request
      description: Debug endpoint to see raw request data
      operationId: debug_tracker_request_api_v1_trackers_debug_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - bearerAuth: []
  /api/v1/trackers:
    get:
      tags:
      - Trackers
      summary: List Trackers
      description: List all non-deleted trackers for the current user.
      operationId: list_trackers_api_v1_trackers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TrackerResponse'
                type: array
                title: Response List Trackers Api V1 Trackers Get
      security:
      - bearerAuth: []
    post:
      tags:
      - Trackers
      summary: Register Tracker
      description: "Register a new issue tracker.\n\nArgs:\n    tracker_data: Tracker\
        \ registration data.\n    background_tasks: Background tasks for sending emails.\n\
        \    current_user: The current authenticated user.\n\nReturns:\n    The registered\
        \ tracker ID.\n\nRaises:\n    HTTPException: If registration fails."
      operationId: register_tracker_api_v1_trackers_post
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Register Tracker Api V1 Trackers Post
      security:
      - bearerAuth: []
  /api/v1/trackers/{tracker_id}:
    get:
      tags:
      - Trackers
      summary: Get Tracker
      description: Get a non-deleted tracker by ID, ensuring it belongs to the current
        user.
      operationId: get_tracker_api_v1_trackers__tracker_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Trackers
      summary: Update Tracker
      description: Update an existing tracker.
      operationId: update_tracker_api_v1_trackers__tracker_id__put
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Trackers
      summary: Delete Tracker
      description: Delete a tracker by ID (soft delete by default, hard delete if
        specified).
      operationId: delete_tracker_api_v1_trackers__tracker_id__delete
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      - name: hard_delete
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Hard Delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Tracker Api V1 Trackers  Tracker Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/trackers/test-and-list-orgs:
    post:
      tags:
      - Trackers
      summary: Test Connection And List Orgs
      description: 'Tests connection to a tracker and lists accessible organizations/groups.

        This endpoint does not fetch the projects within each organization.'
      operationId: test_connection_and_list_orgs_api_v1_trackers_test_and_list_orgs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/trackers/list-projects-for-org:
    post:
      tags:
      - Trackers
      summary: List Projects For Org
      description: Lists projects for a specific organization/group within a tracker.
      operationId: list_projects_for_org_api_v1_trackers_list_projects_for_org_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProjectIdentifier'
                type: array
                title: Response List Projects For Org Api V1 Trackers List Projects
                  For Org Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/detect:
    post:
      tags:
      - Issues
      - Issues
      - AI
      summary: Detect dependencies between a list of issues using an AI model.
      description: 'Analyzes a list of issues to find potential dependencies between
        them.


        - **issue_ids**: A list of UUIDs for the issues to be analyzed.

        - **model_id**: Optional ID of a specific AI model to use. If not provided,
        the user''s default model will be used.'
      operationId: detect_issue_dependencies_api_v1_issue_dependencies_detect_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DependencyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/commit:
    post:
      tags:
      - Issues
      - Issues
      summary: Commit a list of issue dependencies.
      description: 'Commits a list of issue dependency pairs. This will create the
        dependency in the external tracker and mark it as ''committed'' in SpaceBridge.


        - **dependencies**: A list of dependency pairs to commit.'
      operationId: commit_issue_dependencies_api_v1_issue_dependencies_commit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitDependenciesRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/issue-dependencies/extend:
    post:
      tags:
      - Issues
      - Issues
      - AI
      summary: Extend the dependency scan for a specific issue.
      description: 'Extends the dependency scan for a specific issue to find more
        related issues.


        - **issue_ids**: The IDs of the issues to extend the scan from.

        - **extend_by**: The number of additional issues to fetch and analyze.'
      operationId: extend_dependency_scan_api_v1_issue_dependencies_extend_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendScanRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/organizations:
    post:
      tags:
      - Organizations
      summary: Create Organization
      description: Create a new organization, ensuring it's linked to the current
        user's tracker.
      operationId: create_organization_api_v1_organizations_post
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Organizations
      summary: List Organizations
      description: List organizations accessible to the current user.
      operationId: list_organizations_api_v1_organizations_get
      security:
      - bearerAuth: []
      parameters:
      - name: limit
