      tags:
      - Roles
      summary: List Roles
      description: "List all available roles.\n\nArgs:\n    current_user: Current\
        \ authenticated user\n    db: Database session\n\nReturns:\n    dict: List\
        \ of roles with their permissions"
      operationId: list_roles_api_v1_roles_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - bearerAuth: []
  /api/v1/invitations:
    post:
      tags:
      - Invitations
      summary: Create Invitation
      description: "Create a new user invitation.\n\nArgs:\n    invitation_data: Invitation\
        \ data with email, optional role IDs, and optional team IDs\n    current_user:\
        \ Current authenticated user\n    db: Database session\n\nReturns:\n    InvitationResponse:\
        \ Created invitation data\n\nRaises:\n    HTTPException: If user already exists\
        \ or invitation already pending"
      operationId: create_invitation_api_v1_invitations_post
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Invitations
      summary: List Invitations
      description: "List all invitations in the current account.\n\nArgs:\n    current_user:\
        \ Current authenticated user\n    db: Database session\n    skip: Number of\
        \ records to skip\n    limit: Maximum number of records to return\n    status_filter:\
        \ Optional status filter (pending, accepted, expired, cancelled)\n\nReturns:\n\
        \    InvitationListResponse: Paginated list of invitations"
      operationId: list_invitations_api_v1_invitations_get
      security:
      - bearerAuth: []
      parameters:
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: Limit
      - name: status_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status Filter
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/invitations/{invitation_id}:
    get:
      tags:
      - Invitations
      summary: Get Invitation
      description: "Get a specific invitation by ID.\n\nArgs:\n    invitation_id:\
        \ Invitation ID to retrieve\n    current_user: Current authenticated user\n\
        \    db: Database session\n\nReturns:\n    InvitationResponse: Invitation\
        \ data\n\nRaises:\n    HTTPException: If invitation not found or not in same\
        \ account"
      operationId: get_invitation_api_v1_invitations__invitation_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: invitation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Invitation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Invitations
      summary: Cancel Invitation
      description: "Cancel a pending invitation.\n\nArgs:\n    invitation_id: Invitation\
        \ ID to cancel\n    current_user: Current authenticated user\n    db: Database\
        \ session\n\nRaises:\n    HTTPException: If invitation not found, not in same\
        \ account, or already accepted"
      operationId: cancel_invitation_api_v1_invitations__invitation_id__delete
      security:
      - bearerAuth: []
      parameters:
      - name: invitation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Invitation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/invitations/{invitation_id}/resend:
    post:
      tags:
      - Invitations
      summary: Resend Invitation
      description: "Resend an invitation email.\n\nArgs:\n    invitation_id: Invitation\
        \ ID to resend\n    current_user: Current authenticated user\n    db: Database\
        \ session\n\nRaises:\n    HTTPException: If invitation not found, not in same\
        \ account, or not pending"
      operationId: resend_invitation_api_v1_invitations__invitation_id__resend_post
      security:
      - bearerAuth: []
      parameters:
      - name: invitation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Invitation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/invitations/public/{token}:
    get:
      tags:
      - Invitations
      summary: Get Invitation Info
      description: "Get public information about an invitation (for the accept page).\n\
        \nThis endpoint is public and doesn't require authentication.\n\nArgs:\n \
        \   token: Invitation token\n    db: Database session\n\nReturns:\n    InvitationPublicInfo:\
        \ Public invitation information"
      operationId: get_invitation_info_api_v1_invitations_public__token__get
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationPublicInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/invitations/accept:
    post:
      tags:
      - Invitations
      summary: Accept Invitation
      description: "Accept an invitation and create a new user account.\n\nThis endpoint\
        \ is public and doesn't require authentication.\n\nArgs:\n    accept_data:\
        \ Invitation acceptance data (token, username, password, full_name)\n    db:\
        \ Database session\n\nReturns:\n    dict: Success message with user ID\n\n\
        Raises:\n    HTTPException: If invitation invalid, expired, or username already\
        \ exists"
      operationId: accept_invitation_api_v1_invitations_accept_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAccept'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
