openapi: 3.1.0
info:
  title: SpaceBridge API
  description: REST API for SpaceBridge issue tracking management
  version: 0.1.0
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register
      description: "Register a new user.\n\nArgs:\n    user_data: User creation data.\n\
        \    background_tasks: Background tasks for sending emails.\n    request:\
        \ The incoming request object.\n\nReturns:\n    The created user.\n\nRaises:\n\
        \    HTTPException: If the username or email is already taken."
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spacebridge__schemas__auth__UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spacebridge__schemas__auth__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify Email
      description: "Verify a user's email address.\n\nArgs:\n    verification_data:\
        \ Email verification data with token.\n\nReturns:\n    Success message.\n\n\
        Raises:\n    HTTPException: If the token is invalid or the user does not exist."
      operationId: verify_email_api_v1_auth_verify_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Verify Email Api V1 Auth Verify Email Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot Password
      description: "Send a password reset email.\n\nArgs:\n    reset_data: Password\
        \ reset request with email.\n    background_tasks: Background tasks for sending\
        \ emails.\n\nReturns:\n    Success message."
      operationId: forgot_password_api_v1_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Forgot Password Api V1 Auth Forgot Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset Password
      description: "Reset a user's password.\n\nArgs:\n    reset_data: Password reset\
        \ confirmation with token and new password.\n\nReturns:\n    Success message.\n\
        \nRaises:\n    HTTPException: If the token is invalid or the user does not\
        \ exist."
      operationId: reset_password_api_v1_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Reset Password Api V1 Auth Reset Password Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token:
    post:
      tags:
      - Auth
      summary: Login Form
      description: "Login to get an access token using form data (required for OAuth2\
        \ flow).\n\nArgs:\n    form_data: OAuth2 password request form.\n\nReturns:\n\
        \    Access token.\n\nRaises:\n    HTTPException: If the username or password\
        \ is incorrect."
      operationId: login_form_api_v1_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_form_api_v1_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token/json:
    post:
      tags:
      - Auth
      summary: Login Json
      description: "Login to get an access token using JSON data.\n\nArgs:\n    request:\
        \ Login request with username and password.\n\nReturns:\n    Access token.\n\
        \nRaises:\n    HTTPException: If the username or password is incorrect."
      operationId: login_json_api_v1_auth_token_json_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh Token
      description: "Refresh an access token using a refresh token.\n\nArgs:\n    request:\
        \ Refresh token request.\n\nReturns:\n    New access token.\n\nRaises:\n \
        \   HTTPException: If the refresh token is invalid or expired."
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/users/me:
    get:
      tags:
      - Auth
      summary: Read Users Me
      description: "Get the current user.\n\nArgs:\n    current_user: The current\
        \ user.\n\nReturns:\n    The current user."
      operationId: read_users_me_api_v1_auth_users_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spacebridge__schemas__auth__UserResponse'
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - Auth
      summary: Update User Me
      description: Update own user.
      operationId: update_user_me_api_v1_auth_users_me_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spacebridge__schemas__auth__UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spacebridge__schemas__auth__UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/users/me/password:
    put:
      tags:
      - Auth
      summary: Change Current User Password
      description: Change current user's password.
      operationId: change_current_user_password_api_v1_auth_users_me_password_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys:
    get:
      tags:
      - Auth
      summary: List Api Keys
      description: "List all API keys for the current user.\n\nArgs:\n    current_user:\
        \ The current authenticated user.\n\nReturns:\n    List of API keys."
      operationId: list_api_keys_api_v1_auth_api_keys_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeySummary'
                type: array
                title: Response List Api Keys Api V1 Auth Api Keys Get
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - Auth
      summary: Create Api Key
      description: "Create a new API key.\n\nArgs:\n    key_data: The key creation\
        \ data.\n    current_user: The current authenticated user.\n\nReturns:\n \
        \   The created API key details."
      operationId: create_api_key_api_v1_auth_api_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/v1/auth/api-keys/debug:
    get:
      tags:
      - Auth
      summary: Debug Api Keys
      description: "Debug endpoint to get API keys with their values (admin only).\n\
        \nArgs:\n    username: The username to get keys for\n    api_key: Optional\
        \ specific API key to look up\n    current_user: The current authenticated\
        \ user.\n\nReturns:\n    List of API keys with their values."
      operationId: debug_api_keys_api_v1_auth_api_keys_debug_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
          title: Username
      - name: api_key
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Api Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                title: Response Debug Api Keys Api V1 Auth Api Keys Debug Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-keys/{key_id}:
    delete:
      tags:
      - Auth
      summary: Delete Api Key
      description: "Delete an API key.\n\nArgs:\n    key_id: The ID of the key to\
        \ delete.\n    current_user: The current authenticated user.\n\nRaises:\n\
        \    HTTPException: If the key doesn't exist or doesn't belong to the user."
      operationId: delete_api_key_api_v1_auth_api_keys__key_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/api-usage:
    get:
      tags:
      - Auth
      summary: Get Api Usage
      description: "Get API usage statistics for the current user.\n\nArgs:\n    start_date:\
        \ Optional start date for filtering.\n    end_date: Optional end date for\
        \ filtering.\n    current_user: The current authenticated user.\n\nReturns:\n\
        \    API usage statistics."
      operationId: get_api_usage_api_v1_auth_api_usage_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Start Date
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Date
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUsageStatistics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/complete-onboarding:
    post:
      tags:
      - Auth
      summary: Complete Onboarding
      description: 'Completes the onboarding for a new user created via Stripe checkout.

        Sets the password and updates the username.'
      operationId: complete_onboarding_api_v1_auth_complete_onboarding_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/features:
    get:
      tags:
      - Account
      summary: List Account Features
      description: "List available features for the current account.\n\nReturns a\
        \ list of features available to the authenticated user's account.\nThis endpoint\
        \ is used by the frontend to show/hide features based on\nthe account's license\
        \ or subscription.\n\nReturns:\n    Dict with:\n        - features: List of\
        \ available feature names\n        - details: Dict mapping feature names to\
        \ feature info"
      operationId: list_account_features_api_v1_account_features_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - bearerAuth: []
  /api/v1/account/details:
    get:
      tags:
      - Account
      summary: Get Account Details
      description: "Get current account details.\n\nReturns:\n    Account details\
        \ including organization name"
      operationId: get_account_details_api_v1_account_details_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Account
      summary: Update Account Details
      description: "Update current account details.\n\nArgs:\n    update_data: Account\
        \ update data\n    account: Current user's account\n    db: Database session\n\
        \nReturns:\n    Updated account details"
      operationId: update_account_details_api_v1_account_details_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDetailsUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/trackers/debug:
    post:
      tags:
      - Trackers
      summary: Debug Tracker Request
      description: Debug endpoint to see raw request data
      operationId: debug_tracker_request_api_v1_trackers_debug_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - bearerAuth: []
  /api/v1/trackers:
    get:
      tags:
      - Trackers
      summary: List Trackers
      description: List all non-deleted trackers for the current user.
      operationId: list_trackers_api_v1_trackers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TrackerResponse'
                type: array
                title: Response List Trackers Api V1 Trackers Get
      security:
      - bearerAuth: []
    post:
      tags:
      - Trackers
      summary: Register Tracker
      description: "Register a new issue tracker.\n\nArgs:\n    tracker_data: Tracker\
        \ registration data.\n    background_tasks: Background tasks for sending emails.\n\
        \    current_user: The current authenticated user.\n\nReturns:\n    The registered\
        \ tracker ID.\n\nRaises:\n    HTTPException: If registration fails."
      operationId: register_tracker_api_v1_trackers_post
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Register Tracker Api V1 Trackers Post
      security:
      - bearerAuth: []
  /api/v1/trackers/{tracker_id}:
    get:
      tags:
      - Trackers
      summary: Get Tracker
      description: Get a non-deleted tracker by ID, ensuring it belongs to the current
        user.
      operationId: get_tracker_api_v1_trackers__tracker_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Trackers
      summary: Update Tracker
      description: Update an existing tracker.
      operationId: update_tracker_api_v1_trackers__tracker_id__put
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Trackers
      summary: Delete Tracker
      description: Delete a tracker by ID (soft delete by default, hard delete if
        specified).
      operationId: delete_tracker_api_v1_trackers__tracker_id__delete
      security:
      - bearerAuth: []
      parameters:
      - name: tracker_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Tracker Id
      - name: hard_delete
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Hard Delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Tracker Api V1 Trackers  Tracker Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/trackers/test-and-list-orgs:
    post:
      tags:
      - Trackers
      summary: Test Connection And List Orgs
      description: 'Tests connection to a tracker and lists accessible organizations/groups.

        This endpoint does not fetch the projects within each organization.'
      operationId: test_connection_and_list_orgs_api_v1_trackers_test_and_list_orgs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerTestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/trackers/list-projects-for-org:
    post:
      tags:
      - Trackers
      summary: List Projects For Org
      description: Lists projects for a specific organization/group within a tracker.
      operationId: list_projects_for_org_api_v1_trackers_list_projects_for_org_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackerTestRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProjectIdentifier'
                type: array
                title: Response List Projects For Org Api V1 Trackers List Projects
                  For Org Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/mcp-servers:
    get:
      tags:
      - MCP Servers
      summary: List Mcp Servers
      description: "List all MCP servers for the current user.\n\nArgs:\n    current_user:\
        \ Current authenticated user\n    db: Database session\n\nReturns:\n    List\
        \ of MCP servers"
      operationId: list_mcp_servers_api_v1_mcp_servers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MCPServerResponse'
                type: array
                title: Response List Mcp Servers Api V1 Mcp Servers Get
      security:
      - bearerAuth: []
    post:
      tags:
      - MCP Servers
      summary: Create Mcp Server
      description: "Create a new external MCP server configuration.\n\nArgs:\n   \
        \ server_data: MCP server configuration data\n    current_user: Current authenticated\
        \ user\n    db: Database session\n\nReturns:\n    Created MCP server\n\nRaises:\n\
        \    HTTPException: If creation fails or validation fails"
      operationId: create_mcp_server_api_v1_mcp_servers_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPServerCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - bearerAuth: []
  /api/v1/mcp-servers/{server_id}:
    get:
      tags:
      - MCP Servers
      summary: Get Mcp Server
      description: "Get a specific MCP server by ID.\n\nArgs:\n    server_id: MCP\
        \ server ID\n    current_user: Current authenticated user\n    db: Database\
        \ session\n\nReturns:\n    MCP server details\n\nRaises:\n    HTTPException:\
        \ If server not found or access denied"
      operationId: get_mcp_server_api_v1_mcp_servers__server_id__get
      security:
      - bearerAuth: []
      parameters:
      - name: server_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Server Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - MCP Servers
      summary: Update Mcp Server
      description: "Update an existing MCP server configuration.\n\nArgs:\n    server_id:\
        \ MCP server ID\n    server_update: Updated server data\n    current_user:\
        \ Current authenticated user\n    db: Database session\n\nReturns:\n    Updated\
        \ MCP server\n\nRaises:\n    HTTPException: If server not found or update\
        \ fails"
      operationId: update_mcp_server_api_v1_mcp_servers__server_id__put
      security:
      - bearerAuth: []
      parameters:
      - name: server_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Server Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPServerUpdate'
      responses:
        '200':
